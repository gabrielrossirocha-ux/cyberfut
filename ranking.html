<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.png');
            background-repeat: repeat;
            background-size: 120px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .logo { max-width: 60px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.8em; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        /* Abas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .tab {
            background: none;
            border: none;
            padding: 10px 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            color: #666;
        }
        .tab.active {
            background: #8b0000;
            color: white;
        }
        .tab:hover:not(.active) {
            background: #f0f0f0;
        }
        
        /* Filtros */
        .filtros {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .filtro-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f5f5;
            padding: 8px 15px;
            border-radius: 40px;
        }
        .filtro-group label {
            font-weight: 600;
            color: #8b0000;
        }
        select, .btn-filtro {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            background: white;
        }
        .btn-filtro {
            background: #8b0000;
            color: white;
            border: none;
            transition: all 0.3s;
        }
        .btn-filtro:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        .btn-geral {
            background: #1a1a1a;
        }
        .btn-geral:hover {
            background: #333;
        }
        .info-ranking {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #ffe5e5;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 500;
        }
        
        /* Ranking */
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        .ranking-item:hover {
            background: #f9f9f9;
        }
        .ranking-posicao {
            font-size: 1.3em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 100px;
        }
        .posicao-numero {
            color: #8b0000;
            min-width: 40px;
        }
        .variacao {
            font-size: 0.8em;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .variacao.subiu {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .variacao.desceu {
            background: #ffebee;
            color: #c62828;
        }
        .variacao.manteve {
            background: #f5f5f5;
            color: #666;
        }
        .ranking-nome {
            flex: 2;
            font-weight: 600;
            font-size: 1.05em;
        }
        .ranking-estrelas {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        .estrela {
            color: #ffcc00;
            font-size: 1.2em;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        .ranking-total {
            font-weight: 700;
            color: #8b0000;
            min-width: 80px;
            text-align: right;
        }
        .ranking-detalhe {
            font-size: 0.75em;
            color: #666;
            min-width: 120px;
            text-align: right;
        }
        .badge-mensalista {
            background: #ffcc00;
            color: #8b0000;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }
        .badge-convidado {
            background: #555;
            color: white;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }
        .btn-voltar {
            background: #1a1a1a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-voltar:hover {
            background: #333;
            transform: translateY(-2px);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .maior-pontuacao {
            background: linear-gradient(135deg, #fff5f5, #ffe5e5);
            border: 1px solid #8b0000;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .maior-pontuacao span {
            font-size: 1.2em;
            font-weight: bold;
            color: #8b0000;
        }
        @media (max-width: 768px) {
            .ranking-item { flex-wrap: wrap; gap: 10px; }
            .ranking-estrelas { order: 3; width: 100%; justify-content: center; }
            .filtros { flex-direction: column; align-items: stretch; }
            .filtro-group { justify-content: space-between; }
            .tabs { flex-direction: column; align-items: stretch; }
            .tab { text-align: center; }
            .ranking-posicao { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>🏆 Ranking</h1>
            </div>
        </div>

        <div class="card">
            <!-- Abas -->
            <div class="tabs">
                <button class="tab active" data-tab="mensalistas">📌 Mensalistas</button>
                <button class="tab" data-tab="convidados">🎟️ Convidados</button>
            </div>
            
            <!-- Filtros -->
            <div class="filtros">
                <div class="filtro-group">
                    <label>📅 Partida:</label>
                    <select id="selectPartida">
                        <option value="geral">🏆 RANKING GERAL (todas)</option>
                    </select>
                </div>
                <button id="btnCarregar" class="btn-filtro">🔍 Carregar</button>
                <button id="btnRankingGeral" class="btn-filtro btn-geral">🏆 Ranking Geral</button>
            </div>

            <div id="infoRanking" class="info-ranking">Carregando...</div>
            
            <div id="maiorPontuacaoContainer" class="maior-pontuacao" style="display: none;"></div>
            
            <div id="rankingContainer">Carregando...</div>
            
            <button id="btnVoltar" class="btn-voltar">← Voltar ao Início</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let partidasLista = [];
        let abaAtual = 'mensalistas';
        let rankingAnterior = {}; // Guarda posições anteriores

        // Carregar lista de partidas para o select
        async function carregarPartidasSelect() {
            const { data, error } = await supabaseClient
                .from('partidas')
                .select('id, data, local')
                .order('data', { ascending: false });
            
            if (error) {
                console.error('Erro ao carregar partidas:', error);
                return;
            }
            
            partidasLista = data || [];
            const select = document.getElementById('selectPartida');
            
            select.innerHTML = '<option value="geral">🏆 RANKING GERAL (todas)</option>';
            
            partidasLista.forEach(partida => {
                const option = document.createElement('option');
                option.value = partida.id;
                const dataFormatada = new Date(partida.data).toLocaleDateString('pt-BR');
                option.textContent = `📅 ${dataFormatada} - ${partida.local || 'Sem local'}`;
                select.appendChild(option);
            });
        }

        // Calcular ranking anterior (antes da última partida)
        async function calcularRankingAnterior(tipo) {
            if (partidasLista.length < 2) return {};
            
            // Pega as partidas exceto a mais recente
            const partidasAnteriores = [...partidasLista].slice(1);
            if (partidasAnteriores.length === 0) return {};
            
            const idsAnteriores = partidasAnteriores.map(p => p.id);
            
            // Buscar avaliações das partidas anteriores
            const { data: avaliacoes } = await supabaseClient
                .from('avaliacoes_partida')
                .select('avaliado_nome, nota, partida_id')
                .in('partida_id', idsAnteriores);
            
            // Buscar escalas para saber os tipos
            const { data: escalas } = await supabaseClient
                .from('escala_partida')
                .select('jogador_nome, tipo');
            
            if (!avaliacoes) return {};
            
            // Filtrar por tipo
            const convidadosNomes = ['G1', 'G2', 'C1'];
            const nomesFiltrados = new Set();
            escalas?.forEach(e => {
                if (tipo === 'mensalistas' && e.tipo === 'mensalista') {
                    nomesFiltrados.add(e.jogador_nome);
                } else if (tipo === 'convidados' && (e.tipo === 'convidado' || convidadosNomes.includes(e.jogador_nome))) {
                    nomesFiltrados.add(e.jogador_nome);
                }
            });
            
            // Calcular soma de estrelas
            const somaEstrelas = {};
            avaliacoes.forEach(a => {
                if (nomesFiltrados.has(a.avaliado_nome)) {
                    if (!somaEstrelas[a.avaliado_nome]) somaEstrelas[a.avaliado_nome] = 0;
                    somaEstrelas[a.avaliado_nome] += a.nota;
                }
            });
            
            // Criar ranking ordenado
            const ranking = Object.entries(somaEstrelas)
                .map(([nome, total]) => ({ nome, total }))
                .sort((a, b) => b.total - a.total);
            
            // Mapear posição anterior
            const posicoes = {};
            ranking.forEach((item, idx) => {
                posicoes[item.nome] = idx + 1;
            });
            
            return posicoes;
        }

        // Carregar ranking
        async function carregarRanking(partidaId = null) {
            const container = document.getElementById('rankingContainer');
            const infoDiv = document.getElementById('infoRanking');
            const maiorContainer = document.getElementById('maiorPontuacaoContainer');
            
            container.innerHTML = '<div class="loading">Carregando ranking...</div>';
            
            let avaliacoes = [];
            let escala = [];
            let titulo = '';
            let totalPartidas = 0;
            
            // Buscar ranking anterior para variação
            const rankingPosicoesAnteriores = await calcularRankingAnterior(abaAtual);
            
            // Buscar dados
            if (partidaId === 'geral' || partidaId === null) {
                titulo = `🏆 RANKING GERAL - ${abaAtual === 'mensalistas' ? 'Mensalistas' : 'Convidados'}`;
                maiorContainer.style.display = 'block';
                
                const { data: todasAvaliacoes } = await supabaseClient
                    .from('avaliacoes_partida')
                    .select('avaliado_nome, nota, partida_id');
                
                const { data: todasEscalas } = await supabaseClient
                    .from('escala_partida')
                    .select('jogador_nome, tipo');
                
                avaliacoes = todasAvaliacoes || [];
                escala = todasEscalas || [];
                
                const partidasUnicas = new Set(avaliacoes.map(a => a.partida_id));
                totalPartidas = partidasUnicas.size;
                
                // Calcular maior pontuação em uma única partida
                if (abaAtual === 'mensalistas') {
                    const pontuacaoPorPartida = {};
                    avaliacoes.forEach(a => {
                        const jogador = escala.find(e => e.jogador_nome === a.avaliado_nome);
                        if (jogador && jogador.tipo === 'mensalista') {
                            const key = `${a.partida_id}_${a.avaliado_nome}`;
                            if (!pontuacaoPorPartida[key]) pontuacaoPorPartida[key] = 0;
                            pontuacaoPorPartida[key] += a.nota;
                        }
                    });
                    
                    let maiorPontuacao = { nome: '', total: 0, partida: '' };
                    for (const [key, total] of Object.entries(pontuacaoPorPartida)) {
                        if (total > maiorPontuacao.total) {
                            const [partidaIdPart, nome] = key.split('_');
                            const partida = partidasLista.find(p => p.id == partidaIdPart);
                            const dataPartida = partida ? new Date(partida.data).toLocaleDateString('pt-BR') : 'data desconhecida';
                            maiorPontuacao = { nome, total, partida: dataPartida };
                        }
                    }
                    
                    if (maiorPontuacao.total > 0) {
                        maiorContainer.innerHTML = `
                            🏅 <strong>MAIOR PONTUAÇÃO EM UMA ÚNICA PARTIDA</strong> 🏅<br>
                            <span>${maiorPontuacao.nome}</span> recebeu <strong>${maiorPontuacao.total} estrelas</strong> na partida de <strong>${maiorPontuacao.partida}</strong>!
                        `;
                    } else {
                        maiorContainer.innerHTML = '🏅 Aguardando primeiras avaliações para definir a maior pontuação!';
                    }
                } else {
                    maiorContainer.style.display = 'none';
                }
                
            } else {
                const partida = partidasLista.find(p => p.id == partidaId);
                const dataFormatada = partida ? new Date(partida.data).toLocaleDateString('pt-BR') : 'Data desconhecida';
                titulo = `📅 Ranking da Partida - ${dataFormatada} - ${abaAtual === 'mensalistas' ? 'Mensalistas' : 'Convidados'}`;
                maiorContainer.style.display = 'none';
                
                const { data: avaliacoesPartida } = await supabaseClient
                    .from('avaliacoes_partida')
                    .select('avaliado_nome, nota')
                    .eq('partida_id', partidaId);
                
                const { data: escalaPartida } = await supabaseClient
                    .from('escala_partida')
                    .select('jogador_nome, tipo')
                    .eq('partida_id', partidaId);
                
                avaliacoes = avaliacoesPartida || [];
                escala = escalaPartida || [];
                totalPartidas = 1;
            }
            
            // Filtrar por tipo
            const convidadosNomes = ['G1', 'G2', 'C1'];
            const jogadoresFiltrados = escala.filter(e => {
                if (abaAtual === 'mensalistas') {
                    return e.tipo === 'mensalista';
                } else {
                    return e.tipo === 'convidado' || convidadosNomes.includes(e.jogador_nome);
                }
            });
            
            const nomesFiltrados = new Set(jogadoresFiltrados.map(j => j.jogador_nome));
            
            // Filtrar avaliações
            const avaliacoesFiltradas = avaliacoes.filter(a => nomesFiltrados.has(a.avaliado_nome));
            
            // Calcular soma de estrelas
            const somaEstrelas = {};
            avaliacoesFiltradas.forEach(a => {
                if (!somaEstrelas[a.avaliado_nome]) {
                    somaEstrelas[a.avaliado_nome] = 0;
                }
                somaEstrelas[a.avaliado_nome] += a.nota;
            });
            
            // Obter tipo do jogador
            const tipoJogador = {};
            jogadoresFiltrados.forEach(j => {
                tipoJogador[j.jogador_nome] = j.tipo;
            });
            
            // Montar ranking atual
            const rankingAtual = Object.keys(somaEstrelas).map(nome => ({
                nome: nome,
                totalEstrelas: somaEstrelas[nome],
                tipo: tipoJogador[nome] || (convidadosNomes.includes(nome) ? 'convidado' : 'mensalista')
            }));
            
            rankingAtual.sort((a, b) => b.totalEstrelas - a.totalEstrelas);
            
            if (rankingAtual.length === 0) {
                container.innerHTML = '<div class="loading">Nenhuma avaliação encontrada</div>';
                infoDiv.innerHTML = titulo + ' | 📊 0 avaliações';
                return;
            }
            
            // Calcular variação de posição
            const rankingComVariacao = rankingAtual.map((jogador, idx) => {
                const posicaoAtual = idx + 1;
                const posicaoAnterior = rankingPosicoesAnteriores[jogador.nome];
                let variacao = 0;
                let textoVariacao = '';
                let classeVariacao = '';
                
                if (posicaoAnterior) {
                    variacao = posicaoAnterior - posicaoAtual;
                    if (variacao > 0) {
                        textoVariacao = `↑ ${variacao}`;
                        classeVariacao = 'subiu';
                    } else if (variacao < 0) {
                        textoVariacao = `↓ ${Math.abs(variacao)}`;
                        classeVariacao = 'desceu';
                    } else {
                        textoVariacao = '=';
                        classeVariacao = 'manteve';
                    }
                } else {
                    textoVariacao = 'Novo';
                    classeVariacao = 'subiu';
                }
                
                return { ...jogador, posicaoAtual, variacao: textoVariacao, classeVariacao };
            });
            
            const totalAvaliacoes = avaliacoesFiltradas.length;
            infoDiv.innerHTML = `${titulo} | 📊 ${totalAvaliacoes} avaliações | 👥 ${rankingComVariacao.length} jogadores`;
            
            container.innerHTML = rankingComVariacao.map((j, idx) => {
                const estrelasCheias = Math.min(j.totalEstrelas, 10);
                const estrelasString = '★'.repeat(estrelasCheias) + (j.totalEstrelas > 10 ? ` +${j.totalEstrelas - 10}` : '');
                
                return `
                    <div class="ranking-item">
                        <div class="ranking-posicao">
                            <span class="posicao-numero">${j.posicaoAtual}º</span>
                            <span class="variacao ${j.classeVariacao}">${j.variacao}</span>
                        </div>
                        <div class="ranking-nome">
                            ${j.nome}
                            ${j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>'}
                        </div>
                        <div class="ranking-estrelas">
                            ${estrelasString}
                        </div>
                        <div class="ranking-total">${j.totalEstrelas} ⭐</div>
                        <div class="ranking-detalhe">${partidaId === 'geral' ? 'total' : 'nesta partida'}</div>
                    </div>
                `;
            }).join('');
        }
        
        // Eventos
        document.getElementById('btnCarregar').addEventListener('click', () => {
            const partidaSelecionada = document.getElementById('selectPartida').value;
            carregarRanking(partidaSelecionada);
        });
        
        document.getElementById('btnRankingGeral').addEventListener('click', () => {
            document.getElementById('selectPartida').value = 'geral';
            carregarRanking('geral');
        });
        
        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        
        // Abas
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                abaAtual = tab.dataset.tab;
                const partidaSelecionada = document.getElementById('selectPartida').value;
                carregarRanking(partidaSelecionada);
            });
        });
        
        // Inicializar
        async function init() {
            await carregarPartidasSelect();
            await carregarRanking('geral');
        }
        
        init();
    </script>
</body>
</html>
