<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CYSS Futebol - Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.png');
            background-repeat: repeat;
            background-size: 120px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo-area:active { transform: scale(0.98); }
        .logo { max-width: 45px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.4em; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .tab {
            background: none;
            border: none;
            padding: 8px 16px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            color: #666;
        }
        .tab.active { background: #8b0000; color: white; }
        
        .filtros {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .filtro-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 40px;
            flex-wrap: wrap;
        }
        .filtro-group label { font-weight: 600; color: #8b0000; font-size: 0.85em; }
        select, .btn-filtro {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 30px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            background: white;
        }
        .btn-filtro { background: #8b0000; color: white; border: none; }
        .info-ranking {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #ffe5e5;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 500;
            word-break: break-word;
        }
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            gap: 8px;
            flex-wrap: wrap;
        }
        .ranking-posicao {
            font-size: 1.1em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 70px;
        }
        .posicao-numero { color: #8b0000; }
        .variacao {
            font-size: 0.7em;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .variacao.subiu { background: #e8f5e9; color: #2e7d32; }
        .variacao.desceu { background: #ffebee; color: #c62828; }
        .variacao.manteve { background: #f5f5f5; color: #666; }
        .ranking-nome {
            flex: 2;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            color: #8b0000;
            white-space: nowrap;
            overflow-x: auto;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        .ranking-nome:hover { text-decoration: underline; }
        .ranking-estrelas { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
        .estrela { color: #ffcc00; font-size: 1em; }
        .ranking-total { font-weight: 700; color: #8b0000; min-width: 60px; text-align: right; font-size: 0.85em; }
        .ranking-detalhe { font-size: 0.65em; color: #666; min-width: 80px; text-align: right; }
        .badge-mensalista { background: #ffcc00; color: #8b0000; font-size: 0.6em; padding: 2px 6px; border-radius: 20px; margin-left: 6px; display: inline-block; white-space: nowrap; }
        .badge-convidado { background: #555; color: white; font-size: 0.6em; padding: 2px 6px; border-radius: 20px; margin-left: 6px; display: inline-block; white-space: nowrap; }
        .btn-voltar {
            background: #1a1a1a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
        }
        .info-comparacao {
            text-align: center;
            font-size: 0.7em;
            color: #666;
            margin-bottom: 15px;
            padding: 6px;
            background: #f0f0f0;
            border-radius: 20px;
        }
        .loading { text-align: center; padding: 30px; color: #666; }
        
        /* Estilos da aba Regras */
        .regras-container {
            padding: 10px;
        }
        .regra-categoria {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #8b0000;
        }
        .regra-categoria h3 {
            color: #8b0000;
            margin-bottom: 12px;
            font-size: 1.1em;
        }
        .regra-categoria p {
            color: #555;
            font-size: 0.85em;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .regra-categoria ul {
            margin-left: 20px;
            color: #555;
            font-size: 0.85em;
            line-height: 1.5;
        }
        .regra-categoria li {
            margin-bottom: 5px;
        }
        .formula {
            background: #1a1a1a;
            color: #ffcc00;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85em;
            text-align: center;
            margin: 10px 0;
        }
        .destaque {
            font-weight: 700;
            color: #8b0000;
        }
        
        @media (orientation: portrait) {
            body { padding: 12px; }
            .card { padding: 15px; }
            .tab { padding: 6px 12px; font-size: 0.8em; }
            .ranking-nome {
                font-size: 0.75em;
                white-space: normal;
                word-break: break-word;
                max-width: 100px;
                overflow-x: visible;
            }
            .ranking-posicao { font-size: 0.9em; min-width: 55px; }
            .ranking-total { font-size: 0.7em; min-width: 45px; }
            .ranking-detalhe { font-size: 0.55em; min-width: 60px; }
            .logo { max-width: 40px; }
            h1 { font-size: 1.2em; }
            .variacao { font-size: 0.6em; padding: 2px 4px; }
        }
        
        @media (min-width: 768px) and (orientation: landscape) {
            body { padding: 20px; }
            .logo-area { gap: 20px; padding: 15px 30px; }
            .logo { max-width: 60px; }
            h1 { font-size: 1.8em; }
            .card { padding: 25px; }
            .tab { padding: 10px 25px; font-size: 1.1em; }
            .ranking-posicao { min-width: 100px; font-size: 1.3em; }
            .ranking-nome { font-size: 1.05em; max-width: 250px; white-space: nowrap; }
            .estrela { font-size: 1.2em; }
            .ranking-total { font-size: 1em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area" id="logoVoltar">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>🏆 Ranking</h1>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="mensalistas">📌 Mensalistas</button>
                <button class="tab" data-tab="convidados">🎟️ Convidados</button>
                <button class="tab" data-tab="regras">📋 Regras de Rankeamento</button>
            </div>
            
            <div id="filtrosContainer" class="filtros">
                <div class="filtro-group">
                    <label>📅 Partida:</label>
                    <select id="selectPartida">
                        <option value="geral">🏆 RANKING GERAL (todas)</option>
                    </select>
                </div>
                <button id="btnCarregar" class="btn-filtro">🔍 Carregar</button>
            </div>

            <div id="infoRanking" class="info-ranking">Carregando...</div>
            <div id="infoComparacao" class="info-comparacao"></div>
            <div id="rankingContainer">Carregando...</div>
            <button id="btnVoltar" class="btn-voltar">← Voltar ao Início</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let partidasLista = [];
        let abaAtual = 'mensalistas';

        async function carregarPartidasSelect() {
            const { data, error } = await supabaseClient.from('partidas').select('id, data, local').order('data', { ascending: true });
            if (error) return;
            partidasLista = data || [];
            const select = document.getElementById('selectPartida');
            select.innerHTML = '<option value="geral">🏆 RANKING GERAL (todas)</option>';
            [...partidasLista].reverse().forEach(partida => {
                const option = document.createElement('option');
                option.value = partida.id;
                const dataFormatada = new Date(partida.data).toLocaleDateString('pt-BR');
                option.textContent = `📅 ${dataFormatada} - ${partida.local || 'Sem local'}`;
                select.appendChild(option);
            });
        }

        async function getRankingPartida(partidaId, tipo) {
            const { data: avaliacoes } = await supabaseClient.from('avaliacoes_partida').select('avaliado_nome, nota').eq('partida_id', partidaId);
            const { data: escala } = await supabaseClient.from('escala_partida').select('jogador_nome, tipo').eq('partida_id', partidaId);
            if (!avaliacoes || !escala) return [];
            const convidadosNomes = ['G1', 'G2', 'C1', 'C2', 'C3'];
            const jogadoresFiltrados = escala.filter(e => tipo === 'mensalistas' ? e.tipo === 'mensalista' : e.tipo === 'convidado' || convidadosNomes.includes(e.jogador_nome));
            const nomesFiltrados = new Set(jogadoresFiltrados.map(j => j.jogador_nome));
            const avaliacoesFiltradas = avaliacoes.filter(a => nomesFiltrados.has(a.avaliado_nome));
            const somaEstrelas = {};
            avaliacoesFiltradas.forEach(a => { if (!somaEstrelas[a.avaliado_nome]) somaEstrelas[a.avaliado_nome] = 0; somaEstrelas[a.avaliado_nome] += a.nota; });
            const ranking = Object.keys(somaEstrelas).map(nome => ({ nome, totalEstrelas: somaEstrelas[nome], tipo: escala.find(e => e.jogador_nome === nome)?.tipo || 'convidado' }));
            ranking.sort((a, b) => b.totalEstrelas - a.totalEstrelas);
            return ranking.map((item, idx) => ({ ...item, posicao: idx + 1 }));
        }

        function getPartidaAnterior(partidaAtualId) {
            const partidaAtual = partidasLista.find(p => p.id == partidaAtualId);
            if (!partidaAtual) return null;
            const anteriores = partidasLista.filter(p => new Date(p.data) < new Date(partidaAtual.data));
            if (anteriores.length === 0) return null;
            anteriores.sort((a, b) => new Date(b.data) - new Date(a.data));
            return anteriores[0];
        }

        function getVariacao(posAtual, posAnterior) {
            if (posAnterior === undefined) return { texto: 'Novo', classe: 'subiu' };
            const diferenca = posAnterior - posAtual;
            if (diferenca > 0) return { texto: `↑ ${diferenca}`, classe: 'subiu' };
            if (diferenca < 0) return { texto: `↓ ${Math.abs(diferenca)}`, classe: 'desceu' };
            return { texto: '=', classe: 'manteve' };
        }

        async function carregarRegras() {
            const container = document.getElementById('rankingContainer');
            const infoDiv = document.getElementById('infoRanking');
            const comparacaoDiv = document.getElementById('infoComparacao');
            const filtrosDiv = document.getElementById('filtrosContainer');
            
            // Esconder filtros na aba de regras
            filtrosDiv.style.display = 'none';
            infoDiv.style.display = 'none';
            comparacaoDiv.style.display = 'none';
            
            container.innerHTML = `
                <div class="regras-container">
                    <div class="regra-categoria">
                        <h3>🏆 Ranking Geral</h3>
                        <p>O <strong class="destaque">Ranking Geral</strong> acumula todas as estrelas recebidas pelo jogador em <strong>TODAS as partidas</strong> que ele participou.</p>
                        <div class="formula">⭐ TOTAL = Soma de todas as estrelas recebidas em todas as partidas</div>
                        <p><strong>Exemplo:</strong> Se um jogador recebeu 5 estrelas na partida 1, 4 estrelas na partida 2 e 3 estrelas na partida 3, seu total será <strong>12 estrelas</strong>.</p>
                    </div>

                    <div class="regra-categoria">
                        <h3>📅 Ranking por Partida</h3>
                        <p>O <strong class="destaque">Ranking por Partida</strong> mostra apenas as estrelas recebidas em uma <strong>partida específica</strong>.</p>
                        <div class="formula">⭐ TOTAL NA PARTIDA = Soma das estrelas recebidas NAQUELA partida</div>
                        <p><strong>Exemplo:</strong> Se você selecionar a partida do dia 10/06, verá quantas estrelas cada jogador recebeu apenas naquele jogo.</p>
                    </div>

                    <div class="regra-categoria">
                        <h3>📊 Como os times são sorteados?</h3>
                        <p>O sistema utiliza um algoritmo avançado para garantir times <strong>equilibrados</strong>:</p>
                        <ul>
                            <li><strong>Força do jogador:</strong> Calculada pela média de estrelas recebidas + histórico de vitórias + consistência</li>
                            <li><strong>Distribuição:</strong> Jogadores mais fortes são distribuídos alternadamente entre os times</li>
                            <li><strong>Goleiros:</strong> Sempre um goleiro em cada time</li>
                            <li><strong>Objetivo:</strong> Deixar a soma das forças dos dois times o mais próximo possível</li>
                        </ul>
                    </div>

                    <div class="regra-categoria">
                        <h3>🔄 Como a "Força" do jogador é calculada?</h3>
                        <p>A força de cada jogador é atualizada automaticamente após cada partida, usando a fórmula:</p>
                        <div class="formula">FORÇA = (Média de Estrelas × 0.6) + (Taxa de Vitória × 0.3) + (Consistência × 0.1)</div>
                        <ul>
                            <li><strong>Média de Estrelas (60%):</strong> Média aritmética de todas as estrelas que o jogador já recebeu</li>
                            <li><strong>Taxa de Vitória (30%):</strong> Percentual de partidas que o time do jogador venceu</li>
                            <li><strong>Consistência (10%):</strong> Quão constante é o desempenho (baixo desvio padrão)</li>
                        </ul>
                    </div>

                    <div class="regra-categoria">
                        <h3>⬆️⬇️ Setas de Variação</h3>
                        <p>Ao selecionar uma <strong>partida específica</strong>, as setas mostram como o jogador se saiu em relação à <strong>partida anterior</strong>:</p>
                        <ul>
                            <li><span style="color:#2e7d32;">🟢 ↑ N</span> = Subiu N posições em relação à partida anterior</li>
                            <li><span style="color:#c62828;">🔴 ↓ N</span> = Desceu N posições em relação à partida anterior</li>
                            <li><span style="color:#666;">⚪ =</span> = Manteve a mesma posição</li>
                            <li><span style="color:#2e7d32;">🟢 Novo</span> = Não estava na partida anterior</li>
                        </ul>
                    </div>

                    <div class="regra-categoria">
                        <h3>👥 Mensalistas vs Convidados</h3>
                        <p>Os rankings são <strong>separados</strong> para garantir justiça:</p>
                        <ul>
                            <li><strong>📌 Mensalistas:</strong> Jogadores fixos do grupo</li>
                            <li><strong>🎟️ Convidados:</strong> Jogadores eventuais (incluindo goleiros convidados G1, G2, etc.)</li>
                        </ul>
                        <p>Isso evita que convidados, que jogam poucas partidas, distorçam o ranking principal.</p>
                    </div>

                    <div class="regra-categoria">
                        <h3>⭐ Como as estrelas são atribuídas?</h3>
                        <p>Cada mensalista avalia os <strong>outros jogadores</strong> da partida com notas de <strong>1 a 5 estrelas</strong>:</p>
                        <ul>
                            <li>⭐⭐⭐⭐⭐ (5) = Desempenho excepcional</li>
                            <li>⭐⭐⭐⭐ (4) = Bom desempenho</li>
                            <li>⭐⭐⭐ (3) = Desempenho regular</li>
                            <li>⭐⭐ (2) = Abaixo da média</li>
                            <li>⭐ (1) = Desempenho insatisfatório</li>
                        </ul>
                        <p><strong>Atenção:</strong> As avaliações não podem ser alteradas após confirmadas!</p>
                    </div>
                </div>
            `;
        }

        async function carregarRankingGeral() {
            const container = document.getElementById('rankingContainer');
            const infoDiv = document.getElementById('infoRanking');
            const comparacaoDiv = document.getElementById('infoComparacao');
            const filtrosDiv = document.getElementById('filtrosContainer');
            
            filtrosDiv.style.display = 'flex';
            infoDiv.style.display = 'block';
            comparacaoDiv.style.display = 'block';
            comparacaoDiv.innerHTML = '';
            container.innerHTML = '<div class="loading">Carregando...</div>';
            infoDiv.innerHTML = `🏆 RANKING GERAL - ${abaAtual === 'mensalistas' ? 'Mensalistas' : 'Convidados'}`;
            
            const { data: todasAvaliacoes } = await supabaseClient.from('avaliacoes_partida').select('avaliado_nome, nota');
            const { data: todasEscalas } = await supabaseClient.from('escala_partida').select('jogador_nome, tipo');
            const convidadosNomes = ['G1', 'G2', 'C1', 'C2', 'C3'];
            const jogadoresFiltrados = todasEscalas?.filter(e => abaAtual === 'mensalistas' ? e.tipo === 'mensalista' : e.tipo === 'convidado' || convidadosNomes.includes(e.jogador_nome)) || [];
            const nomesFiltrados = new Set(jogadoresFiltrados.map(j => j.jogador_nome));
            const avaliacoesFiltradas = todasAvaliacoes?.filter(a => nomesFiltrados.has(a.avaliado_nome)) || [];
            const somaEstrelas = {};
            avaliacoesFiltradas.forEach(a => { if (!somaEstrelas[a.avaliado_nome]) somaEstrelas[a.avaliado_nome] = 0; somaEstrelas[a.avaliado_nome] += a.nota; });
            const ranking = Object.keys(somaEstrelas).map(nome => ({ nome, totalEstrelas: somaEstrelas[nome], tipo: jogadoresFiltrados.find(j => j.jogador_nome === nome)?.tipo || 'convidado' }));
            ranking.sort((a, b) => b.totalEstrelas - a.totalEstrelas);
            if (ranking.length === 0) { container.innerHTML = '<div class="loading">Nenhuma avaliação encontrada</div>'; return; }
            
            container.innerHTML = ranking.map((j, idx) => {
                const estrelasString = '★'.repeat(Math.min(j.totalEstrelas, 10)) + (j.totalEstrelas > 10 ? ` +${j.totalEstrelas - 10}` : '');
                const badge = j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>';
                return `
                    <div class="ranking-item">
                        <div class="ranking-posicao"><span class="posicao-numero">${idx+1}º</span></div>
                        <div class="ranking-nome" onclick="window.location.href='jogador.html?nome=${encodeURIComponent(j.nome)}'">${j.nome} ${badge}</div>
                        <div class="ranking-estrelas">${estrelasString}</div>
                        <div class="ranking-total">${j.totalEstrelas} ⭐</div>
                        <div class="ranking-detalhe">total</div>
                    </div>
                `;
            }).join('');
        }

        async function carregarRankingPartida(partidaId) {
            const container = document.getElementById('rankingContainer');
            const infoDiv = document.getElementById('infoRanking');
            const comparacaoDiv = document.getElementById('infoComparacao');
            const filtrosDiv = document.getElementById('filtrosContainer');
            
            filtrosDiv.style.display = 'flex';
            infoDiv.style.display = 'block';
            
            const partidaAtual = partidasLista.find(p => p.id == partidaId);
            if (!partidaAtual) return;
            const partidaAnterior = getPartidaAnterior(partidaId);
            const rankingAtual = await getRankingPartida(partidaId, abaAtual);
            let rankingAnteriorMap = {};
            let comparando = false;
            if (partidaAnterior && rankingAtual.length > 0) {
                const rankingAnterior = await getRankingPartida(partidaAnterior.id, abaAtual);
                rankingAnterior.forEach(item => { rankingAnteriorMap[item.nome] = item.posicao; });
                comparando = true;
                comparacaoDiv.innerHTML = `📊 Comparado com a partida anterior (${new Date(partidaAnterior.data).toLocaleDateString('pt-BR')}) | ↑ subiu ↓ desceu = manteve`;
            } else { comparacaoDiv.innerHTML = '📊 Primeira partida - sem comparação anterior'; }
            infoDiv.innerHTML = `📅 Ranking da Partida - ${new Date(partidaAtual.data).toLocaleDateString('pt-BR')} - ${abaAtual === 'mensalistas' ? 'Mensalistas' : 'Convidados'}`;
            if (rankingAtual.length === 0) { container.innerHTML = '<div class="loading">Nenhuma avaliação para esta partida</div>'; return; }
            
            container.innerHTML = rankingAtual.map(j => {
                const variacao = getVariacao(j.posicao, rankingAnteriorMap[j.nome]);
                const estrelasString = '★'.repeat(Math.min(j.totalEstrelas, 10));
                const badge = j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>';
                return `
                    <div class="ranking-item">
                        <div class="ranking-posicao"><span class="posicao-numero">${j.posicao}º</span>${comparando ? `<span class="variacao ${variacao.classe}">${variacao.texto}</span>` : ''}</div>
                        <div class="ranking-nome" onclick="window.location.href='jogador.html?nome=${encodeURIComponent(j.nome)}'">${j.nome} ${badge}</div>
                        <div class="ranking-estrelas">${estrelasString}</div>
                        <div class="ranking-total">${j.totalEstrelas} ⭐</div>
                        <div class="ranking-detalhe">nesta partida</div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('btnCarregar').addEventListener('click', async () => { 
            const valor = document.getElementById('selectPartida').value; 
            if (abaAtual === 'regras') {
                await carregarRegras();
            } else if (valor === 'geral') { 
                await carregarRankingGeral(); 
            } else { 
                await carregarRankingPartida(parseInt(valor)); 
            } 
        });
        
        document.getElementById('btnVoltar').addEventListener('click', () => { window.location.href = 'index.html'; });
        document.getElementById('logoVoltar').addEventListener('click', () => { window.location.href = 'index.html'; });
        
        document.querySelectorAll('.tab').forEach(tab => { 
            tab.addEventListener('click', async () => { 
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); 
                tab.classList.add('active'); 
                abaAtual = tab.dataset.tab; 
                
                if (abaAtual === 'regras') {
                    await carregarRegras();
                } else {
                    const valor = document.getElementById('selectPartida').value; 
                    if (valor === 'geral') { 
                        await carregarRankingGeral(); 
                    } else { 
                        await carregarRankingPartida(parseInt(valor)); 
                    } 
                }
            }); 
        });
        
        async function init() { 
            await carregarPartidasSelect(); 
            await carregarRankingGeral(); 
        }
        init();
    </script>
</body>
</html>
