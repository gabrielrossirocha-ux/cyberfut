<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CYSS Futebol - Administração</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/sorteio.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.png');
            background-repeat: repeat;
            background-size: 120px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo-area:active { transform: scale(0.98); }
        .logo { max-width: 45px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.4em; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn {
            background: #8b0000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
            min-height: 40px;
        }
        .btn-pequeno { padding: 6px 12px; font-size: 12px; }
        .btn-verde { background: #2c5f2d; }
        .btn-azul { background: #1e4a76; }
        .btn-vermelho { background: #8b0000; }
        .btn-criar { background: #ff9800; color: #1a0000; }
        .btn-info { background: #2196f3; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .tab {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            color: #666;
        }
        .tab.active { background: #8b0000; color: white; }
        .tab:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .tabela-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; color: #8b0000; font-weight: 600; }
        tr:hover { background: #f9f9f9; }
        
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; align-items: flex-end; }
        .form-group { flex: 1; min-width: 150px; }
        .form-group label { display: block; font-size: 0.8em; font-weight: 600; color: #666; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-size: 14px; }
        .form-group input:disabled, .form-group select:disabled { opacity: 0.6; cursor: not-allowed; background: #f5f5f5; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .stat-number { font-size: 2.5em; font-weight: 700; color: #8b0000; }
        .stat-label { font-size: 0.8em; color: #666; }
        
        .login-area { max-width: 400px; margin: 0 auto; }
        .login-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
        }
        .login-input:disabled { opacity: 0.6; cursor: not-allowed; background: #f5f5f5; }
        .loading { text-align: center; padding: 40px; color: #666; }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .checkbox-group input { width: 20px; height: 20px; margin: 0; }
        .checkbox-group input:disabled { opacity: 0.5; cursor: not-allowed; }
        .checkbox-group label { font-weight: 600; color: #8b0000; margin: 0; }
        
        .checkbox-goleiro {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        .checkbox-goleiro input { width: 18px; height: 18px; margin: 0; }
        .checkbox-goleiro input:disabled { opacity: 0.5; cursor: not-allowed; }
        .checkbox-goleiro label { font-size: 0.8em; color: #555; margin: 0; cursor: pointer; }
        
        .placar-input {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .placar-input input {
            width: 55px;
            padding: 6px;
            text-align: center;
            margin: 0;
        }
        .placar-input input:disabled { opacity: 0.6; cursor: not-allowed; background: #f5f5f5; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 90%;
            width: 600px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-content h3 { color: #8b0000; margin-bottom: 20px; text-align: center; }
        .modal-content h4 { color: #8b0000; margin: 15px 0 10px 0; text-align: center; }
        .times-preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .time-preview {
            background: #f5f5f5;
            border-radius: 16px;
            padding: 15px;
        }
        .time-preview h4 { color: #8b0000; margin-bottom: 10px; text-align: center; }
        .time-preview ul { list-style: none; padding: 0; }
        .time-preview li { padding: 5px 0; border-bottom: 1px solid #ddd; font-size: 0.85em; }
        .forca-info { margin-top: 10px; padding-top: 10px; border-top: 1px solid #ccc; text-align: center; font-weight: bold; }
        .modal-botoes { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        .modal-botoes button { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-confirmar { background: #2c5f2d; color: white; }
        .btn-refazer { background: #ff9800; color: #1a0000; }
        .btn-cancelar { background: #666; color: white; }
        .btn-fechar { background: #666; color: white; }
        .tentativas { text-align: center; margin-bottom: 15px; font-size: 0.85em; color: #666; }
        
        .resumo-pagamentos {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .resumo-item {
            background: #f5f5f5;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
        }
        .resumo-item.verde { background: #e8f5e9; color: #2c5f2d; }
        .resumo-item.vermelho { background: #ffebee; color: #c62828; }
        
        .aviso-convidado {
            background: #ff9800;
            color: #1a0000;
            padding: 10px;
            text-align: center;
            font-weight: 600;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #e65100;
        }
        
        @media (orientation: portrait) {
            body { padding: 12px; }
            .card { padding: 15px; }
            th, td { padding: 8px; font-size: 0.8em; }
            .form-row { flex-direction: column; }
            .form-group { width: 100%; }
            .times-preview { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area" id="logoVoltar">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>🔧 Administração</h1>
            </div>
            <div id="avisoConvidado" class="aviso-convidado" style="display: none;">
                👁️ Modo Convidado - Visualização completa. Você pode explorar o sistema, mas não pode criar, editar ou excluir dados.
            </div>
        </div>

        <!-- TELA DE LOGIN -->
        <div id="loginScreen" class="card">
            <div class="login-area">
                <h2>🔐 Login Administrativo</h2>
                <input type="text" id="adminUser" class="login-input" placeholder="Usuário">
                <input type="password" id="adminSenha" class="login-input" placeholder="Senha">
                <button id="btnLoginAdmin" class="btn">Entrar</button>
            </div>
        </div>

        <!-- CONTEÚDO ADMIN -->
        <div id="adminContent" style="display: none;">
            <div class="card">
                <div class="tabs">
                    <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
                    <button class="tab" data-tab="criar">⚡ Criar Partida</button>
                    <button class="tab" data-tab="partidas">⚽ Partidas</button>
                    <button class="tab" data-tab="pagamentos">💳 Pagamentos</button>
                    <button class="tab" data-tab="mensalistas">👥 Mensalistas</button>
                    <button class="tab" data-tab="locais">📍 Locais</button>
                    <button class="tab" data-tab="ferramentas">🛠️ Ferramentas</button>
                </div>
                <div id="tabContent"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        window.supabaseClient = supabaseClient;

        let abaAtual = 'dashboard';
        let locaisLista = [];
        let ultimoSorteio = null;
        let tentativasSorteio = 0;
        let isModoConvidado = false;

        function formatarDataAdmin(dataString) {
            if (!dataString) return '-';
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        // ============================================
        // HABILITAR MODO VISUALIZAÇÃO (CONVIDADO)
        // ============================================
        function habilitarModoVisualizacao() {
            isModoConvidado = true;
            
            document.getElementById('avisoConvidado').style.display = 'block';
            
            document.querySelectorAll('.btn').forEach(btn => {
                if (!btn.classList.contains('tab')) {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                }
            });
            
            document.querySelectorAll('input, select, textarea').forEach(el => {
                el.disabled = true;
                el.style.opacity = '0.7';
                el.style.cursor = 'not-allowed';
            });
            
            document.querySelectorAll('input[type="checkbox"]').forEach(el => {
                el.disabled = true;
                el.style.opacity = '0.7';
                el.style.cursor = 'not-allowed';
            });
            
            document.querySelectorAll('.btn-deletar, .btn-vermelho, .btn-verde, .btn-azul, .btn-criar').forEach(btn => {
                btn.style.display = 'none';
            });
        }

        // ============================================
        // LOGIN
        // ============================================
        document.getElementById('btnLoginAdmin').addEventListener('click', async () => {
            const usuario = document.getElementById('adminUser').value.trim();
            const senha = document.getElementById('adminSenha').value;
            
            if (!usuario) { alert('Digite o usuário!'); return; }
            if (!senha) { alert('Digite a senha!'); return; }
            
            const { data, error } = await supabaseClient
                .from('mensalistas')
                .select('id, nome, senha_hash, is_admin, is_convidado')
                .eq('nome', usuario)
                .single();
            
            if (error || !data) {
                alert('Usuário não encontrado!');
                return;
            }
            
            if (data.is_convidado) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                
                await carregarLocais();
                carregarDashboard();
                carregarMensalistas();
                carregarPartidas();
                
                habilitarModoVisualizacao();
                return;
            }
            
            if (!data.is_admin) {
                alert('Você não tem permissão de administrador!');
                return;
            }
            
            if (senha !== data.senha_hash) {
                alert('Senha incorreta!');
                return;
            }
            
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            
            await carregarLocais();
            carregarDashboard();
            carregarMensalistas();
            carregarPartidas();
        });

        // ============================================
        // TABS
        // ============================================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                abaAtual = tab.dataset.tab;
                if (abaAtual === 'dashboard') carregarDashboard();
                else if (abaAtual === 'criar') carregarCriarPartida();
                else if (abaAtual === 'partidas') carregarPartidas();
                else if (abaAtual === 'pagamentos') carregarPagamentos();
                else if (abaAtual === 'mensalistas') carregarMensalistas();
                else if (abaAtual === 'locais') carregarLocaisAdmin();
                else if (abaAtual === 'ferramentas') carregarFerramentas();
            });
        });

        async function carregarLocais() {
            const { data, error } = await supabaseClient.from('locais').select('id, nome, endereco').order('nome');
            if (!error) locaisLista = data || [];
        }

        async function carregarDashboard() {
            const container = document.getElementById('tabContent');
            container.innerHTML = '<div class="loading">Carregando...</div>';
            const { count: partidas } = await supabaseClient.from('partidas').select('*', { count: 'exact', head: true });
            const { count: avaliacoes } = await supabaseClient.from('avaliacoes_partida').select('*', { count: 'exact', head: true });
            const { count: mensalistas } = await supabaseClient.from('mensalistas').select('*', { count: 'exact', head: true });
            const { count: admins } = await supabaseClient.from('mensalistas').select('*', { count: 'exact', head: true }).eq('is_admin', true);
            const { count: locais } = await supabaseClient.from('locais').select('*', { count: 'exact', head: true });
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">${partidas || 0}</div><div class="stat-label">Partidas</div></div>
                    <div class="stat-card"><div class="stat-number">${avaliacoes || 0}</div><div class="stat-label">Avaliações</div></div>
                    <div class="stat-card"><div class="stat-number">${mensalistas || 0}</div><div class="stat-label">Mensalistas</div></div>
                    <div class="stat-card"><div class="stat-number">${admins || 0}</div><div class="stat-label">Administradores</div></div>
                    <div class="stat-card"><div class="stat-number">${locais || 0}</div><div class="stat-label">Locais</div></div>
                </div>
            `;
        }

        // ============================================
        // CRIAR PARTIDA (CORRIGIDO)
        // ============================================
        function carregarCriarPartida() {
            const container = document.getElementById('tabContent');
            
            // Buscar mensalistas para popular o select
            supabaseClient.from('mensalistas').select('id, nome, nota_inicial').order('nome').then(({ data: mensalistas }) => {
                const selectMensalistas = mensalistas?.map(m => `<option value="${m.nome}" data-nota="${m.nota_inicial || 3}">${m.nome}</option>`).join('');
                
                container.innerHTML = `
                    <h2 style="color:#8b0000; margin-bottom:20px;">⚡ Criar Partida Rápida</h2>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 Data</label>
                            <input type="date" id="rapida_data" value="${new Date().toISOString().split('T')[0]}" ${isModoConvidado ? 'disabled' : ''}>
                        </div>
                        <div class="form-group">
                            <label>⏰ Horário</label>
                            <input type="time" id="rapida_horario" value="19:00" ${isModoConvidado ? 'disabled' : ''}>
                        </div>
                        <div class="form-group">
                            <label>📍 Local</label>
                            <select id="rapida_local" ${isModoConvidado ? 'disabled' : ''}>
                                <option value="">Selecione</option>
                                ${locaisLista.map(l => `<option value="${l.id}" data-endereco="${l.endereco || ''}">${l.nome}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="todosMensalistas" ${isModoConvidado ? 'disabled' : ''}>
                        <label for="todosMensalistas" ${isModoConvidado ? 'style="opacity:0.5;"' : ''}>📌 Incluir TODOS os mensalistas</label>
                    </div>
                    
                    <div class="form-row" id="selecaoIndividual" style="${isModoConvidado ? 'display:none;' : 'display:block;'}">
                        <div class="form-group" style="flex:2;">
                            <label>👥 Selecionar mensalistas</label>
                            <select id="selectMensaInd" style="margin-bottom:10px;" ${isModoConvidado ? 'disabled' : ''}>
                                <option value="">-- Selecione --</option>
                                ${selectMensalistas}
                            </select>
                            <div id="listaMensalistasSelecionados" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;"></div>
                        </div>
                        <div class="form-group">
                            <label>🎟️ Convidado</label>
                            <input type="text" id="convidadoNome" placeholder="Nome" ${isModoConvidado ? 'disabled' : ''}>
                            <div class="checkbox-goleiro">
                                <input type="checkbox" id="convidadoGoleiro" ${isModoConvidado ? 'disabled' : ''}>
                                <label for="convidadoGoleiro" ${isModoConvidado ? 'style="opacity:0.5;"' : ''}>🧤 É goleiro?</label>
                            </div>
                            <button id="btnAddConvidado" class="btn btn-pequeno" style="margin-top:8px; ${isModoConvidado ? 'display:none;' : ''}">+ Adicionar</button>
                        </div>
                    </div>
                    
                    <div style="margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 12px;">
                        <strong>📋 Jogadores:</strong>
                        <div id="jogadoresSelecionados" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px;"></div>
                    </div>
                    
                    <button id="btnCriarPartidaRapida" class="btn btn-criar" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>🎲 AVANÇAR PARA SORTEIO</button>
                    
                    <div id="resultadoTimes" style="margin-top: 20px;"></div>
                `;
                
                if (isModoConvidado) {
                    container.innerHTML += `<div style="text-align:center; padding:20px; background:#f0f0f0; border-radius:12px; margin-top:20px; color:#666;">👁️ Modo Convidado - Visualização apenas. Esta área é para criação de partidas.</div>`;
                }
                
                // ============================================
                // LÓGICA DE SELEÇÃO DE JOGADORES (CORRIGIDA)
                // ============================================
                let jogadoresSelecionados = [];
                const todosCheckbox = document.getElementById('todosMensalistas');
                const selecaoIndividual = document.getElementById('selecaoIndividual');
                const listaDiv = document.getElementById('jogadoresSelecionados');
                const listaMensalistasDiv = document.getElementById('listaMensalistasSelecionados');
                const selectMensaInd = document.getElementById('selectMensaInd');
                let mensalistasSelecionados = [];
                
                function atualizarListaExibicao() {
                    listaDiv.innerHTML = jogadoresSelecionados.map(j => `
                        <span style="background:#8b0000; color:white; padding:4px 12px; border-radius:20px;">
                            ${j.nome} ${j.posicao === 'Goleiro' ? '🧤' : ''}
                            <span onclick="removerJogadorSelecionado('${j.nome}')" style="cursor:pointer; margin-left:8px;">&times;</span>
                        </span>
                    `).join('');
                    if (jogadoresSelecionados.length === 0) listaDiv.innerHTML = '<span style="color:#999;">Nenhum jogador</span>';
                }
                
                window.removerJogadorSelecionado = (nome) => {
                    jogadoresSelecionados = jogadoresSelecionados.filter(j => j.nome !== nome);
                    if (mensalistasSelecionados.includes(nome)) {
                        mensalistasSelecionados = mensalistasSelecionados.filter(m => m !== nome);
                        atualizarListaMensalistas();
                    }
                    atualizarListaExibicao();
                };
                
                function atualizarListaMensalistas() {
                    listaMensalistasDiv.innerHTML = mensalistasSelecionados.map(nome => `
                        <span style="background:#ffcc00; color:#8b0000; padding:4px 12px; border-radius:20px;">
                            📌 ${nome}
                            <span onclick="removerJogadorSelecionado('${nome}')" style="cursor:pointer; margin-left:8px;">&times;</span>
                        </span>
                    `).join('');
                    if (mensalistasSelecionados.length === 0) listaMensalistasDiv.innerHTML = '<span style="color:#999;">Nenhum selecionado</span>';
                }
                
                if (selectMensaInd) {
                    selectMensaInd.addEventListener('change', (e) => {
                        const nome = e.target.value;
                        if (nome && !mensalistasSelecionados.includes(nome) && !jogadoresSelecionados.some(j => j.nome === nome)) {
                            mensalistasSelecionados.push(nome);
                            jogadoresSelecionados.push({ nome, tipo: 'mensalista', posicao: 'Fixo' });
                            atualizarListaMensalistas();
                            atualizarListaExibicao();
                        }
                        e.target.value = '';
                    });
                }
                
                const btnAddConvidado = document.getElementById('btnAddConvidado');
                if (btnAddConvidado) {
                    btnAddConvidado.addEventListener('click', () => {
                        const nome = document.getElementById('convidadoNome').value.trim();
                        const isGoleiro = document.getElementById('convidadoGoleiro')?.checked || false;
                        
                        if (nome && !jogadoresSelecionados.some(j => j.nome === nome)) {
                            jogadoresSelecionados.push({ 
                                nome, 
                                tipo: 'convidado', 
                                posicao: isGoleiro ? 'Goleiro' : 'Fixo' 
                            });
                            document.getElementById('convidadoNome').value = '';
                            document.getElementById('convidadoGoleiro').checked = false;
                            atualizarListaExibicao();
                        } else if (nome) {
                            alert('Jogador já adicionado!');
                        } else {
                            alert('Digite o nome!');
                        }
                    });
                }
                
                if (todosCheckbox) {
                    todosCheckbox.addEventListener('change', async (e) => {
                        if (e.target.checked) {
                            selecaoIndividual.style.display = 'none';
                            const { data: todosMensalistas } = await supabaseClient.from('mensalistas').select('nome');
                            if (todosMensalistas) {
                                jogadoresSelecionados = todosMensalistas.map(m => ({ nome: m.nome, tipo: 'mensalista', posicao: 'Fixo' }));
                                atualizarListaExibicao();
                            }
                        } else {
                            selecaoIndividual.style.display = 'block';
                            jogadoresSelecionados = [];
                            mensalistasSelecionados = [];
                            atualizarListaMensalistas();
                            atualizarListaExibicao();
                        }
                    });
                }
                
                // Botão de criar partida
                const btnCriar = document.getElementById('btnCriarPartidaRapida');
                if (btnCriar) {
                    btnCriar.addEventListener('click', async () => {
                        if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode criar partidas.'); return; }
                        
                        const data = document.getElementById('rapida_data').value;
                        const horario = document.getElementById('rapida_horario').value;
                        const localId = document.getElementById('rapida_local').value;
                        
                        if (!data) { alert('Selecione a data!'); return; }
                        if (!localId) { alert('Selecione o local!'); return; }
                        if (jogadoresSelecionados.length < 4) { alert('Mínimo 4 jogadores!'); return; }
                        
                        const local = locaisLista.find(l => l.id == localId);
                        
                        // Buscar forças dos jogadores
                        const forcasMap = {};
                        const { data: forcas } = await supabaseClient.from('forca_jogador').select('jogador_nome, forca');
                        forcas?.forEach(f => { forcasMap[f.jogador_nome] = f.forca || 3; });
                        
                        const jogadoresParaSorteio = jogadoresSelecionados.map(j => ({
                            nome: j.nome,
                            forca: forcasMap[j.nome] || 3,
                            posicao: j.posicao || 'Fixo',
                            tipo: j.tipo
                        }));
                        
                        const { timeA, timeB, somaA, somaB } = sortearTimes(jogadoresParaSorteio);
                        
                        const partida = {
                            data: data,
                            horario: horario,
                            local_id: parseInt(localId),
                            endereco: local?.endereco || '',
                            observacoes: 'Criada pelo admin'
                        };
                        
                        const { data: novaPartida, error } = await supabaseClient.from('partidas').insert(partida).select().single();
                        if (error) { alert('Erro: ' + error.message); return; }
                        
                        const partidaId = novaPartida.id;
                        
                        const escala = [...timeA.map(j => ({ ...j, time: 'A' })), ...timeB.map(j => ({ ...j, time: 'B' }))];
                        for (const j of escala) {
                            await supabaseClient.from('escala_partida').insert({
                                partida_id: partidaId, 
                                jogador_nome: j.nome, 
                                posicao: j.posicao,
                                habilidades: [], 
                                tipo: j.tipo, 
                                time: j.time
                            });
                        }
                        
                        const resultadoDiv = document.getElementById('resultadoTimes');
                        const notaFormatada = (nota) => '⭐'.repeat(Math.round(nota)) + '☆'.repeat(5 - Math.round(nota));
                        resultadoDiv.innerHTML = `
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                                <div style="background:#fff5f5; border-radius:16px; padding:15px;">
                                    <h3>🔴 TIME A</h3>
                                    ${timeA.map(j => `<div><strong>${j.nome}</strong> ${notaFormatada(forcasMap[j.nome] || 3)}</div>`).join('')}
                                    <div style="margin-top:10px; font-weight:bold;">Força: ${somaA.toFixed(1)}</div>
                                </div>
                                <div style="background:#fafafa; border-radius:16px; padding:15px;">
                                    <h3>⚪ TIME B</h3>
                                    ${timeB.map(j => `<div><strong>${j.nome}</strong> ${notaFormatada(forcasMap[j.nome] || 3)}</div>`).join('')}
                                    <div style="margin-top:10px; font-weight:bold;">Força: ${somaB.toFixed(1)}</div>
                                </div>
                            </div>
                            <div style="margin-top:15px; text-align:center; color:#2c5f2d;">✅ Partida criada!</div>
                        `;
                        
                        carregarPartidas();
                    });
                }
                
                atualizarListaExibicao();
                if (!todosCheckbox?.checked) {
                    selecaoIndividual.style.display = 'block';
                }
            });
        }

        async function carregarPagamentos() {
            const container = document.getElementById('tabContent');

            const mesAtual = new Date().getMonth() + 1;
            const anoAtual = new Date().getFullYear();

                .from('pagamentos')

                .eq('mes', mesAtual)
                .eq('ano', anoAtual);
            
            const pagamentosMap = {};

            });

            let html = `

                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Mensalista</th>
                                <th>Status</th>
                                <th>Data Pagamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>

                    <button class="btn btn-azul" onclick="gerarRelatorioPagamentos()">📊 Relatório</button>
                </div>
            `;
            
            container.innerHTML = html;
            
            const tbody = document.getElementById('pagamentosTable');
            
            tbody.innerHTML = mensalistas.map(m => {
                const pagamento = pagamentosMap[m.id];
                const pago = pagamento?.pago || false;
                const dataPagamento = pagamento?.data_pagamento ? formatarDataAdmin(pagamento.data_pagamento) : '-';
                
                if (pago) pagos++;
                else pendentes++;
                
                return `

                            </button>

            document.getElementById('totalPagos').textContent = pagos;

        window.togglePagamento = async function(mensalistaId) {
            if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode alterar dados.'); return; }
            const mesAtual = new Date().getMonth() + 1;
            const anoAtual = new Date().getFullYear();
            
            const { data: pagamento } = await supabaseClient
                .from('pagamentos')
                .select('*')
                .eq('mensalista_id', mensalistaId)
                .eq('mes', mesAtual)
                .eq('ano', anoAtual)
                .maybeSingle();
            
            const novoStatus = !pagamento?.pago;
            const dataPagamento = novoStatus ? new Date().toISOString().split('T')[0] : null;
            
            if (pagamento) {
                await supabaseClient
                    .from('pagamentos')
                    .update({ pago: novoStatus, data_pagamento: dataPagamento })
                    .eq('id', pagamento.id);
            } else {
                await supabaseClient
                    .from('pagamentos')
                    .insert({
                        mensalista_id: mensalistaId,
                        mes: mesAtual,
                        ano: anoAtual,
                        pago: novoStatus,
                        data_pagamento: dataPagamento
                    });
            }
            
            carregarPagamentos();
        };

            const mesAtual = new Date().getMonth() + 1;

            relatorio += `\n❌ PENDENTES:\n`;

                    <button class="btn btn-verde" id="btnAdicionarLocal" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>➕ Adicionar</button>
                </div>
                <div class="tabela-container">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Nome</th><th>Endereço</th><th>Ações</th></tr>
                        </thead>
                        <tbody id="locaisTable"></tbody>
                    </table>
                </div>
            `;
            const tbody = document.getElementById('locaisTable');
            tbody.innerHTML = (data || []).map(l => `
                <tr>
                    <td>${l.id}</td>
                    <td><input type="text" id="local_nome_${l.id}" value="${l.nome}" style="width:100%;" ${isModoConvidado ? 'disabled' : ''}></td>
                    <td><input type="text" id="local_endereco_${l.id}" value="${l.endereco || ''}" style="width:100%;" ${isModoConvidado ? 'disabled' : ''}></td>
                    <td>
                        <button class="btn btn-azul btn-pequeno" onclick="editarLocal(${l.id})" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>💾 Salvar</button>
                        <button class="btn btn-vermelho btn-pequeno" onclick="deletarLocal(${l.id})" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>🗑️ Excluir</button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('btnAdicionarLocal').onclick = adicionarLocal;
        }

        window.adicionarLocal = async () => {
            if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode adicionar dados.'); return; }
            const nome = document.getElementById('novoLocalNome').value.trim();
            const endereco = document.getElementById('novoLocalEndereco').value.trim();
            if (!nome) { alert('Digite o nome do local!'); return; }
            const { error } = await supabaseClient.from('locais').insert({ nome, endereco });
            if (error) { alert('Erro: ' + error.message); return; }
            carregarLocaisAdmin();
            carregarDashboard();
            await carregarLocais();
        };

        window.editarLocal = async (id) => {
            if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode editar dados.'); return; }
            const nome = document.getElementById(`local_nome_${id}`).value;
            const endereco = document.getElementById(`local_endereco_${id}`).value;
            const { error } = await supabaseClient.from('locais').update({ nome, endereco }).eq('id', id);
            if (error) { alert('Erro: ' + error.message); return; }
            alert('Local atualizado!');
            carregarLocaisAdmin();
            await carregarLocais();
        };

        window.deletarLocal = async (id) => {
            if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode excluir dados.'); return; }
            const { count } = await supabaseClient.from('partidas').select('*', { count: 'exact', head: true }).eq('local_id', id);
            if (count > 0) {
                alert(`Não é possível excluir! Este local está sendo usado em ${count} partida(s).`);
                return;
            }
            if (!confirm('Tem certeza?')) return;
            const { error } = await supabaseClient.from('locais').delete().eq('id', id);
            if (error) { alert('Erro: ' + error.message); return; }
            carregarLocaisAdmin();
            carregarDashboard();
            await carregarLocais();
        };

        // ============================================
        // FERRAMENTAS
        // ============================================
        function carregarFerramentas() {
            const container = document.getElementById('tabContent');
            container.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 20px;">
                    <div style="padding: 15px; background: #f5f5f5; border-radius: 16px;">
                        <h3 style="color: #8b0000;">🗑️ Limpeza de Dados</h3>
                        <p>Remove todas as avaliações, mas mantém partidas e escalas.</p>
                        <button class="btn" id="btnLimparAvaliacoes" style="background:#ff9800; margin-top:10px;" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>Limpar Avaliações</button>
                    </div>
                    <div style="padding: 15px; background: #f5f5f5; border-radius: 16px;">
                        <h3 style="color: #8b0000;">⚠️ Reset Completo</h3>
                        <p>Remove TODOS os dados: partidas, avaliações, escalas. Mantém apenas mensalistas e locais.</p>
                        <button class="btn btn-vermelho" id="btnResetCompleto" ${isModoConvidado ? 'disabled style="display:none;"' : ''}>Resetar Banco</button>
                    </div>
                    ${isModoConvidado ? '<div style="text-align:center; padding:20px; background:#f0f0f0; border-radius:12px; color:#666;">👁️ Modo Convidado - Ferramentas de administração estão desabilitadas.</div>' : ''}
                </div>
            `;
            document.getElementById('btnLimparAvaliacoes').onclick = async () => {
                if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode executar esta ação.'); return; }
                if (!confirm('Limpar TODAS as avaliações?')) return;
                const { error } = await supabaseClient.from('avaliacoes_partida').delete().neq('id', 0);
                if (error) { alert('Erro: ' + error.message); return; }
                alert('Avaliações removidas!');
                carregarDashboard();
            };
            document.getElementById('btnResetCompleto').onclick = async () => {
                if (isModoConvidado) { alert('👁️ Modo Convidado - Você não pode executar esta ação.'); return; }
                if (!confirm('⚠️ ATENÇÃO! Resetar tudo?')) return;
                await supabaseClient.from('avaliacoes_partida').delete().neq('id', 0);
                await supabaseClient.from('escala_partida').delete().neq('id', 0);
                await supabaseClient.from('partidas').delete().neq('id', 0);
                alert('Banco resetado!');
                carregarDashboard();
                carregarPartidas();
            };
        }

        document.getElementById('logoVoltar').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
