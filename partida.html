<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .logo { max-width: 60px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.8em; }
        .subtitulo { color: #ffcccc; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .info-partida {
            text-align: center;
            font-size: 1.1em;
            background: #ffe5e5;
            padding: 15px;
            border-radius: 16px;
        }
        .grid-2colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .time-vermelho { background: #fff5f5; border: 2px solid #8b0000; }
        .time-branco { background: #fafafa; border: 2px solid #ccc; }
        .lista-times li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge-mensalista { background: #ffcc00; color: #8b0000; font-size: 0.7em; padding: 2px 8px; border-radius: 20px; }
        .badge-convidado { background: #555; color: white; font-size: 0.7em; padding: 2px 8px; border-radius: 20px; }
        .btn {
            background: #8b0000;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }
        .btn-avaliar { background: #ffcc00; color: #8b0000; }
        .btn-ranking { background: #1a1a1a; }
        .botoes {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .btn { min-width: 200px; }
        @media (max-width: 768px) { .grid-2colunas { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>⚽ Detalhes da Partida</h1>
            </div>
            <p class="subtitulo">Times sorteados e resultados</p>
        </div>

        <div class="card">
            <div id="infoPartida" class="info-partida">Carregando...</div>
        </div>

        <div class="grid-2colunas">
            <div class="card time-vermelho">
                <h2>🔴 TIME VERMELHO</h2>
                <ul id="timeALista" class="lista-times"></ul>
            </div>
            <div class="card time-branco">
                <h2>⚪ TIME BRANCO</h2>
                <ul id="timeBLista" class="lista-times"></ul>
            </div>
        </div>

        <div class="botoes">
            <button id="btnAvaliar" class="btn btn-avaliar">⭐ AVALIAR JOGADORES</button>
            <button id="btnRanking" class="btn btn-ranking">🏆 VER RANKING</button>
            <button id="btnNovoJogo" class="btn">📅 NOVO JOGO</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                    ⏰ ${partida.horario || '--:--'} | 
                    📍 ${partida.local || 'Local não definido'}

                    </li>
                `).join('');
