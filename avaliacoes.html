<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Avaliações</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .logo {
            max-width: 60px;
            height: auto;
            border-radius: 12px;
        }

        h1 {
            color: white;
            font-size: 1.8em;
        }

        .subtitulo {
            color: #ffcccc;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .login-area {
            max-width: 400px;
            margin: 0 auto;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-voltar {
            background: #1a1a1a;
            margin-top: 10px;
        }

        .btn-voltar:hover {
            background: #333;
        }

        .estrelas {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            justify-content: center;
        }

        .estrela {
            font-size: 40px;
            cursor: pointer;
            color: #ccc;
            transition: all 0.2s;
        }

        .estrela.selected {
            color: #ffcc00;
        }

        .estrela:hover {
            transform: scale(1.1);
        }

        .jogadores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .jogador-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border-left: 5px solid #8b0000;
            transition: transform 0.2s;
        }

        .jogador-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .jogador-nome {
            font-size: 1.3em;
            font-weight: 700;
            color: #8b0000;
            margin-bottom: 10px;
        }

        .comentario-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px 0;
            font-family: inherit;
            resize: vertical;
        }

        .btn-avaliar {
            background: #8b0000;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .btn-avaliar:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .ja-avaliado {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        .badge-avaliado {
            display: inline-block;
            background: #4caf50;
            color: white;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        .ranking-nome {
            font-weight: 600;
        }

        .ranking-nota {
            background: #8b0000;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 12px;
        }

        .mensagem-erro {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .jogadores-grid {
                grid-template-columns: 1fr;
            }
            .estrela {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>⭐ Área do Mensalista</h1>
            </div>
            <p class="subtitulo">CYSS FUTEBOL | Avalie o desempenho dos jogadores</p>
        </div>

        <div id="app">
            <!-- TELA DE LOGIN -->
            <div id="loginScreen" class="card">
                <div class="login-area">
                    <h2>🔐 Login do Mensalista</h2>
                    <select id="selectMensalistaLogin" class="login-input">
                        <option value="">Carregando mensalistas...</option>
                    </select>
                    <input type="password" id="senhaLogin" class="login-input" placeholder="Sua senha">
                    <button id="btnLogin" class="btn">Entrar</button>
                    <button id="btnVoltarHome" class="btn btn-voltar">← Voltar ao Sorteio</button>
                </div>
            </div>

            <!-- TELA DE AVALIAÇÕES (aparece após login) -->
            <div id="avaliacoesScreen" style="display: none;">
                <div class="user-info" id="userInfo"></div>
                
                <div class="card">
                    <h2>🏆 Ranking dos Melhores Avaliados</h2>
                    <div id="rankingContainer">
                        <div class="loading">Carregando ranking...</div>
                    </div>
                </div>

                <div class="card">
                    <h2>📝 Avaliar Jogadores</h2>
                    <div id="jogadoresContainer">
                        <div class="loading">Carregando jogadores...</div>
                    </div>
                </div>

                <button id="btnLogout" class="btn btn-voltar" style="margin-top: 20px;">Sair</button>
            </div>
        </div>
    </div>

    <!-- Carregar a biblioteca do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ============================================
        // CONFIGURAÇÃO DO SUPABASE (JÁ PREENCHIDA)
        // ============================================
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        
        // Criar cliente do Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ============================================
        // ESTADO GLOBAL
        // ============================================
        let mensalistaAtual = null;
        let jogadoresLista = [];
        let avaliacoesFeitas = {};
        
        // ============================================
        // ELEMENTOS DOM
        // ============================================
        const loginScreen = document.getElementById('loginScreen');
        const avaliacoesScreen = document.getElementById('avaliacoesScreen');
        const selectMensalistaLogin = document.getElementById('selectMensalistaLogin');
        const senhaLogin = document.getElementById('senhaLogin');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const btnVoltarHome = document.getElementById('btnVoltarHome');
        const userInfo = document.getElementById('userInfo');
        const rankingContainer = document.getElementById('rankingContainer');
        const jogadoresContainer = document.getElementById('jogadoresContainer');
        
        // ============================================
        // FUNÇÃO: Carregar mensalistas no select
        // ============================================
        async function carregarMensalistasLogin() {
            selectMensalistaLogin.innerHTML = '<option value="">Carregando...</option>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('mensalistas')
                    .select('id, nome')
                    .order('nome');
                
                if (error) {
                    console.error('Erro ao carregar mensalistas:', error);
                    selectMensalistaLogin.innerHTML = '<option value="">Erro ao carregar</option>';
                    return;
                }
                
                if (!data || data.length === 0) {
                    selectMensalistaLogin.innerHTML = '<option value="">Nenhum mensalista cadastrado</option>';
                    return;
                }
                
                selectMensalistaLogin.innerHTML = '<option value="">Selecione seu nome</option>';
                data.forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.id;
                    option.textContent = m.nome;
                    selectMensalistaLogin.appendChild(option);
                });
                
                console.log('Mensalistas carregados:', data.length);
            } catch (err) {
                console.error('Erro na conexão:', err);
                selectMensalistaLogin.innerHTML = '<option value="">Erro de conexão</option>';
            }
        }
        
        // ============================================
        // FUNÇÃO: Login
        // ============================================
        async function fazerLogin() {
            const mensalistaId = selectMensalistaLogin.value;
            const senha = senhaLogin.value;
            
            if (!mensalistaId) {
                alert('Selecione seu nome!');
                return;
            }
            
            if (!senha) {
                alert('Digite sua senha!');
                return;
            }
            
            // Buscar mensalista no banco
            const { data, error } = await supabaseClient
                .from('mensalistas')
                .select('id, nome, senha_hash')
                .eq('id', mensalistaId)
                .single();
            
            if (error || !data) {
                alert('Erro ao fazer login!');
                return;
            }
            
            // Verificar senha (padrão: futebol123)
            if (senha !== data.senha_hash && senha !== 'futebol123') {
                alert('Senha incorreta! A senha padrão é: futebol123');
                return;
            }
            
            mensalistaAtual = { id: data.id, nome: data.nome };
            
            // Carregar dados do sistema
            await carregarAvaliacoesMensalista();
            await carregarJogadores();
            await carregarRanking();
            
            // Mostrar tela de avaliações
            loginScreen.style.display = 'none';
            avaliacoesScreen.style.display = 'block';
            userInfo.innerHTML = `<span>👤 Mensalista: ${mensalistaAtual.nome}</span> <span>⭐ Avalie os jogadores!</span>`;
        }
        
        // ============================================
        // FUNÇÃO: Carregar avaliações já feitas
        // ============================================
        async function carregarAvaliacoesMensalista() {
            const { data, error } = await supabaseClient
                .from('avaliacoes')
                .select('jogador_id, nota, comentario')
                .eq('mensalista_id', mensalistaAtual.id);
            
            if (error) {
                console.error('Erro ao carregar avaliações:', error);
                return;
            }
            
            avaliacoesFeitas = {};
            if (data) {
                data.forEach(a => {
                    avaliacoesFeitas[a.jogador_id] = { nota: a.nota, comentario: a.comentario };
                });
            }
        }
        
        // ============================================
        // FUNÇÃO: Carregar jogadores
        // ============================================
        async function carregarJogadores() {
            const { data, error } = await supabaseClient
                .from('jogadores_avaliados')
                .select('*')
                .order('nome');
            
            if (error) {
                console.error('Erro ao carregar jogadores:', error);
                jogadoresContainer.innerHTML = '<div class="loading">Erro ao carregar jogadores</div>';
                return;
            }
            
            jogadoresLista = data || [];
            renderizarJogadores();
        }
        
        // ============================================
        // FUNÇÃO: Renderizar cards de jogadores
        // ============================================
        function renderizarJogadores() {
            if (jogadoresLista.length === 0) {
                jogadoresContainer.innerHTML = '<div class="loading">Nenhum jogador cadastrado</div>';
                return;
            }
            
            jogadoresContainer.innerHTML = '';
            
            jogadoresLista.forEach(jogador => {
                const jaAvaliado = avaliacoesFeitas[jogador.id];
                const card = document.createElement('div');
                card.className = `jogador-card ${jaAvaliado ? 'ja-avaliado' : ''}`;
                
                let notaTemp = jaAvaliado ? jaAvaliado.nota : 0;
                let comentarioTemp = jaAvaliado ? jaAvaliado.comentario || '' : '';
                
                card.innerHTML = `
                    <div class="jogador-nome">
                        ${jogador.nome}
                        ${jaAvaliado ? '<span class="badge-avaliado">Já avaliado</span>' : ''}
                    </div>
                    <div class="estrelas" data-jogador="${jogador.id}">
                        ${[1,2,3,4,5].map(n => `
                            <span class="estrela ${notaTemp >= n ? 'selected' : ''}" data-nota="${n}">★</span>
                        `).join('')}
                    </div>
                    <textarea class="comentario-input" placeholder="Comentário (opcional, até 100 caracteres)" maxlength="100">${comentarioTemp}</textarea>
                    <button class="btn-avaliar" data-jogador="${jogador.id}" ${jaAvaliado ? 'disabled' : ''}>
                        ${jaAvaliado ? '✓ Avaliado' : '⭐ Avaliar'}
                    </button>
                `;
                
                const estrelasDiv = card.querySelector('.estrelas');
                let notaSelecionada = notaTemp;
                
                // Evento das estrelas
                estrelasDiv.querySelectorAll('.estrela').forEach(estrela => {
                    estrela.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const nota = parseInt(estrela.dataset.nota);
                        notaSelecionada = nota;
                        estrelasDiv.querySelectorAll('.estrela').forEach((s, idx) => {
                            if (idx < nota) s.classList.add('selected');
                            else s.classList.remove('selected');
                        });
                    });
                });
                
                const btnAvaliar = card.querySelector('.btn-avaliar');
                const textarea = card.querySelector('.comentario-input');
                
                if (!jaAvaliado) {
                    btnAvaliar.addEventListener('click', async () => {
                        if (notaSelecionada === 0) {
                            alert('Selecione uma nota de 1 a 5 estrelas!');
                            return;
                        }
                        
                        const comentario = textarea.value.substring(0, 100);
                        
                        const { error } = await supabaseClient
                            .from('avaliacoes')
                            .insert({
                                mensalista_id: mensalistaAtual.id,
                                jogador_id: jogador.id,
                                nota: notaSelecionada,
                                comentario: comentario
                            });
                        
                        if (error) {
                            alert('Erro ao salvar avaliação: ' + error.message);
                            return;
                        }
                        
                        alert(`✅ ${jogador.nome} avaliado com ${notaSelecionada} estrelas!`);
                        
                        await carregarAvaliacoesMensalista();
                        await carregarRanking();
                        renderizarJogadores();
                    });
                }
                
                jogadoresContainer.appendChild(card);
            });
        }
        
        // ============================================
        // FUNÇÃO: Carregar ranking
        // ============================================
        async function carregarRanking() {
            const { data, error } = await supabaseClient
                .from('avaliacoes')
                .select(`
                    jogador_id,
                    nota,
                    jogadores_avaliados (nome)
                `);
            
            if (error) {
                console.error('Erro ao carregar ranking:', error);
                rankingContainer.innerHTML = '<div class="loading">Erro ao carregar ranking</div>';
                return;
            }
            
            if (!data || data.length === 0) {
                rankingContainer.innerHTML = '<div class="loading">Nenhuma avaliação ainda. Seja o primeiro!</div>';
                return;
            }
            
            const medias = {};
            const contagens = {};
            
            data.forEach(a => {
                const jogadorId = a.jogador_id;
                if (!medias[jogadorId]) {
                    medias[jogadorId] = 0;
                    contagens[jogadorId] = 0;
                }
                medias[jogadorId] += a.nota;
                contagens[jogadorId]++;
            });
            
            const ranking = [];
            for (const jogadorId in medias) {
                const media = medias[jogadorId] / contagens[jogadorId];
                const jogador = data.find(a => a.jogador_id == jogadorId)?.jogadores_avaliados;
                ranking.push({
                    nome: jogador?.nome || 'Desconhecido',
                    media: media.toFixed(1),
                    total: contagens[jogadorId]
                });
            }
            
            ranking.sort((a, b) => b.media - a.media);
            
            rankingContainer.innerHTML = ranking.map((j, idx) => `
                <div class="ranking-item">
                    <div class="ranking-nome">
                        ${idx + 1}º - ${j.nome}
                        <small style="color:#888;">(${j.total} avaliações)</small>
                    </div>
                    <div class="ranking-nota">⭐ ${j.media}</div>
                </div>
            `).join('');
        }
        
        // ============================================
        // FUNÇÃO: Logout
        // ============================================
        function fazerLogout() {
            mensalistaAtual = null;
            loginScreen.style.display = 'block';
            avaliacoesScreen.style.display = 'none';
            senhaLogin.value = '';
            selectMensalistaLogin.value = '';
            carregarMensalistasLogin();
        }
        
        // ============================================
        // FUNÇÃO: Voltar para página de sorteio
        // ============================================
        function voltarHome() {
            window.location.href = 'index.html';
        }
        
        // ============================================
        // EVENTOS DOS BOTÕES
        // ============================================
        btnLogin.addEventListener('click', fazerLogin);
        btnLogout.addEventListener('click', fazerLogout);
        btnVoltarHome.addEventListener('click', voltarHome);
        
        senhaLogin.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
        
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        carregarMensalistasLogin();
    </script>
</body>
</html>
