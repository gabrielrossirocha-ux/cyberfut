<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Nova Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .logo { max-width: 60px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.8em; }
        .subtitulo { color: #ffcccc; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .campo {
            margin-bottom: 20px;
        }
        .campo label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #8b0000;
        }
        .btn {
            background: #8b0000;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>⚽ CYSS FUTEBOL</h1>
            </div>
            <p class="subtitulo">Organize suas partidas e acompanhe o desempenho dos jogadores</p>
        </div>

        <div class="card">
            <h2>📋 Criar Nova Partida</h2>
            
            <div class="campo">
                <label>📅 Data da Partida</label>
                <input type="date" id="dataPartida" required>
            </div>
            
            <div class="grid-2">
                <div class="campo">
                    <label>⏰ Horário</label>
                    <input type="time" id="horarioPartida">
                </div>
                <div class="campo">
                    <label>📍 Local</label>
                    <input type="text" id="localPartida" placeholder="Ex: Quadra do Centro">
                </div>
            </div>
            
            <div class="campo">
                <label>🏟️ Endereço</label>
                <input type="text" id="enderecoPartida" placeholder="Rua, número, bairro">
            </div>
            
            <div class="campo">
                <label>📝 Observações (opcional)</label>
                <input type="text" id="observacoes" placeholder="Informações adicionais">
            </div>
            
            <button id="btnCriarPartida" class="btn">➡️ CRIAR PARTIDA E IR PARA ESCALA</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('btnCriarPartida').addEventListener('click', async () => {
            const data = document.getElementById('dataPartida').value;
            if (!data) {
                alert('Selecione a data da partida!');
                return;
            }

            const partida = {
                data: data,
                horario: document.getElementById('horarioPartida').value,
                local: document.getElementById('localPartida').value,
                endereco: document.getElementById('enderecoPartida').value,
                observacoes: document.getElementById('observacoes').value
            };

            const { data: novaPartida, error } = await supabaseClient
                .from('partidas')
                .insert(partida)
                .select()
                .single();

            if (error) {
                alert('Erro ao criar partida: ' + error.message);
                return;
            }

            localStorage.setItem('partidaAtual', novaPartida.id);
            window.location.href = 'escala.html';
        });
    </script>
</body>
</html>
