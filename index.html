<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* INTRO */
        #intro {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Estádio */
        .stadium {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center,
                rgba(30,30,30,.8) 0%,
                rgba(0,0,0,1) 70%);
        }

        .lights {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 200px;
            background: radial-gradient(circle,
                rgba(255,255,255,.9) 0%,
                rgba(255,255,255,.1) 10%,
                transparent 20%);
            background-size: 100px 100px;
            animation: lightsOn 1s ease forwards;
            opacity: 0;
        }

        @keyframes lightsOn {
            to { opacity: 1; }
        }

        /* Partículas */
        .particles {
            position: absolute;
            inset: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff0000;
            border-radius: 50%;
            animation: float 3s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }
            20% { opacity: 1; }
            to {
                transform: translateY(-100px);
                opacity: 0;
            }
        }

        /* Bola */
        .ball {
            position: absolute;
            width: 140px;
            height: 140px;
            background: url("https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg") center/contain no-repeat;
            animation: shoot 3s forwards;
            z-index: 5;
        }

        @keyframes shoot {
            0% {
                transform: scale(.3);
                opacity: 0;
            }
            20% {
                transform: scale(1);
                opacity: 1;
            }
            60% {
                transform: scale(1.4) rotate(360deg);
            }
            100% {
                transform: scale(12) rotate(1080deg);
                opacity: 0;
            }
        }

        /* Explosão */
        .flash {
            position: absolute;
            inset: 0;
            background: red;
            opacity: 0;
            animation: explode 1s ease forwards;
            animation-delay: 2.8s;
        }

        @keyframes explode {
            0% { opacity: 0; }
            20% { opacity: .9; }
            100% { opacity: 0; }
        }

        /* Logo */
        .logo-wrapper {
            position: absolute;
            text-align: center;
            opacity: 0;
            animation: showLogo 1s ease forwards;
            animation-delay: 3.2s;
            z-index: 10;
        }

        .logo {
            width: 280px;
            max-width: 70vw;
            filter: drop-shadow(0 0 15px red) drop-shadow(0 0 30px rgba(255,0,0,0.5));
            border-radius: 20px;
        }

        .title {
            color: #fff;
            font-size: 42px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px red;
        }

        .subtitle {
            color: #ccc;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        @keyframes showLogo {
            from {
                transform: scale(.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Fade final */
        .fade-out {
            animation: endIntro .8s forwards;
        }

        @keyframes endIntro {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>
<body>

    <!-- TELA DE ABERTURA -->
    <div id="intro">
        <div class="stadium"></div>
        <div class="lights"></div>
        <div class="particles" id="particles"></div>
        <div class="ball"></div>
        <div class="flash"></div>
        <div class="logo-wrapper">
            <img class="logo" src="image.png" alt="CYSS Futebol">
            <div class="title">CYSS FUTEBOL</div>
            <div class="subtitle">Campeonato Interno</div>
        </div>
    </div>

    <script>
        // Criar partículas
        const container = document.getElementById('particles');
        for (let i = 0; i < 120; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = (Math.random() * 3) + 's';
            p.style.animationDuration = (2 + Math.random() * 3) + 's';
            container.appendChild(p);
        }

        // Encerrar intro e redirecionar para o site principal
        setTimeout(() => {
            document.getElementById('intro').classList.add('fade-out');
            
            // Após o fade, redirecionar para o site principal
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 800);
        }, 5000);
    </script>

</body>
</html>
