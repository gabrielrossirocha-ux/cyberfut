<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Ranking da Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* Logo como fundo transparente */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.png');
            background-repeat: repeat;
            background-size: 150px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .logo {
            max-width: 60px;
            height: auto;
            border-radius: 12px;
        }

        h1 {
            color: white;
            font-size: 1.8em;
        }

        .subtitulo {
            color: #ffcccc;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .ranking-item:hover {
            background: #f9f9f9;
        }

        .ranking-posicao {
            font-size: 1.5em;
            font-weight: 700;
            color: #8b0000;
            width: 60px;
        }

        .ranking-nome {
            flex: 2;
            font-weight: 600;
            font-size: 1.1em;
        }

        .ranking-estrelas {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .estrela {
            color: #ffcc00;
            font-size: 1.3em;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }

        .estrela-vazia {
            color: #ccc;
            font-size: 1.3em;
        }

        .ranking-total {
            font-weight: 700;
            color: #8b0000;
            min-width: 80px;
            text-align: right;
        }

        .ranking-media {
            font-size: 0.85em;
            color: #666;
            min-width: 100px;
            text-align: right;
        }

        .badge-mensalista {
            background: #ffcc00;
            color: #8b0000;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .badge-convidado {
            background: #555;
            color: white;
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }

        .btn-voltar {
            background: #1a1a1a;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .info-partida {
            text-align: center;
            font-size: 1.2em;
            color: #8b0000;
            margin-bottom: 20px;
            padding: 10px;
            background: #ffe5e5;
            border-radius: 12px;
        }

        @media (max-width: 768px) {
            .ranking-item {
                flex-wrap: wrap;
                gap: 10px;
            }
            .ranking-estrelas {
                order: 3;
                width: 100%;
                justify-content: center;
            }
            .ranking-total, .ranking-media {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>🏆 Ranking da Partida</h1>
            </div>
            <p class="subtitulo">CYSS FUTEBOL | Total de estrelas e média geral dos jogadores</p>
        </div>

        <div class="card">
            <div id="infoPartida" class="info-partida">Carregando...</div>
            <div id="rankingContainer">
                <div class="loading">Carregando ranking...</div>
            </div>
            <div style="margin-top: 20px; text-align: center;">
                <button id="btnVoltar" class="btn btn-voltar">← Voltar às Partidas</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function getPartidaId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('partida') || localStorage.getItem('partidaRanking');
        }

        async function carregarRanking() {
            const partidaId = getPartidaId();
            if (!partidaId) {
                document.getElementById('rankingContainer').innerHTML = '<div class="loading">Partida não encontrada</div>';
                return;
            }

            // Buscar dados da partida
            const { data: partida } = await supabaseClient.from('partidas').select('*').eq('id', partidaId).single();
            if (partida) {
                document.getElementById('infoPartida').innerHTML = `📅 ${new Date(partida.data).toLocaleDateString('pt-BR')}`;
            }

            // Buscar escala da partida
            const { data: escala } = await supabaseClient.from('escala_partida').select('*').eq('partida_id', partidaId);

            // Buscar avaliações desta partida
            const { data: avaliacoes } = await supabaseClient.from('avaliacoes_partida').select('*').eq('partida_id', partidaId);

            // Buscar TODAS as avaliações anteriores para média geral
            const { data: todasAvaliacoes } = await supabaseClient.from('avaliacoes_partida').select('*');

            if (!escala || escala.length === 0) {
                document.getElementById('rankingContainer').innerHTML = '<div class="loading">Nenhum jogador encontrado nesta partida</div>';
                return;
            }

            // Calcular total de estrelas por jogador nesta partida
            const estrelasPartida = {};
            if (avaliacoes) {
                avaliacoes.forEach(a => {
                    if (!estrelasPartida[a.avaliado_nome]) estrelasPartida[a.avaliado_nome] = 0;
                    estrelasPartida[a.avaliado_nome] += a.nota;
                });
            }

            // Calcular média geral por jogador (todas as partidas)
            const mediaGeral = {};
            const contagemGeral = {};
            if (todasAvaliacoes) {
                todasAvaliacoes.forEach(a => {
                    if (!mediaGeral[a.avaliado_nome]) {
                        mediaGeral[a.avaliado_nome] = 0;
                        contagemGeral[a.avaliado_nome] = 0;
                    }
                    mediaGeral[a.avaliado_nome] += a.nota;
                    contagemGeral[a.avaliado_nome]++;
                });
            }

            // Montar ranking
            const ranking = escala.map(jogador => {
                const totalEstrelas = estrelasPartida[jogador.jogador_nome] || 0;
                const media = mediaGeral[jogador.jogador_nome] ? (mediaGeral[jogador.jogador_nome] / contagemGeral[jogador.jogador_nome]).toFixed(1) : '0';
                const totalAvaliacoes = contagemGeral[jogador.jogador_nome] || 0;
                return {
                    nome: jogador.jogador_nome,
                    tipo: jogador.tipo,
                    totalEstrelas: totalEstrelas,
                    media: media,
                    totalAvaliacoes: totalAvaliacoes
                };
            });

            // Ordenar por total de estrelas (decrescente)
            ranking.sort((a, b) => b.totalEstrelas - a.totalEstrelas);

            const container = document.getElementById('rankingContainer');
            
            if (ranking.every(r => r.totalEstrelas === 0)) {
                container.innerHTML = '<div class="loading">Ainda não há avaliações para esta partida</div>';
                return;
            }

            container.innerHTML = ranking.map((j, idx) => `
                <div class="ranking-item">
                    <div class="ranking-posicao">${idx + 1}º</div>
                    <div class="ranking-nome">
                        ${j.nome}
                        ${j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>'}
                    </div>
                    <div class="ranking-estrelas">
                        ${gerarEstrelas(j.totalEstrelas)}
                    </div>
                    <div class="ranking-total">${j.totalEstrelas} ⭐</div>
                    <div class="ranking-media">📊 Média: ${j.media} ⭐ (${j.totalAvaliacoes} jogos)</div>
                </div>
            `).join('');
        }

        function gerarEstrelas(total) {
            let estrelas = '';
            const inteiras = Math.floor(total);
            for (let i = 0; i < inteiras; i++) estrelas += '<span class="estrela">★</span>';
            return estrelas || '<span class="estrela-vazia">☆☆☆☆☆</span>';
        }

        document.getElementById('btnVoltar').addEventListener('click', () => {
            window.location.href = 'partidas.html';
        });

        carregarRanking();
    </script>
</body>
</html>
