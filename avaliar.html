<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CYSS Futebol - Avaliar Jogadores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 16px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('image.png');
            background-repeat: repeat;
            background-size: 120px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo-area:active { transform: scale(0.98); }
        .logo { max-width: 45px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.4em; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .login-area { max-width: 400px; margin: 0 auto; }
        .login-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        .btn {
            background: #8b0000;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
            min-height: 48px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-salvar {
            background: #2c5f2d;
            font-size: 1.1em;
            margin-top: 20px;
        }
        .btn-salvar:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .estrelas { display: flex; gap: 12px; margin: 15px 0; justify-content: center; flex-wrap: wrap; }
        .estrela { font-size: 40px; cursor: pointer; color: #ccc; transition: all 0.2s; }
        .estrela.selected { color: #ffcc00; }
        .estrela:active { transform: scale(1.1); }
        .jogadores-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 20px; }
        .jogador-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border-left: 5px solid #8b0000;
        }
        .jogador-card.avaliado {
            border-left-color: #2c5f2d;
            background: #f0fff0;
        }
        .jogador-nome { font-size: 1.2em; font-weight: 700; color: #8b0000; margin-bottom: 8px; word-break: break-word; }
        .jogador-nome small { font-size: 0.75em; font-weight: normal; color: #666; }
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: inherit;
            margin: 10px 0;
            resize: vertical;
            font-size: 14px;
        }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f5f5f5;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9em;
            flex-wrap: wrap;
            gap: 10px;
        }
        .status-avaliacao {
            background: #ffe5e5;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85em;
        }
        .status-avaliacao.completo {
            background: #e8f5e9;
            color: #2c5f2d;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        .checkbox-container input {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }
        .checkbox-container label {
            font-size: 0.9em;
            color: #555;
            cursor: pointer;
            margin: 0;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 90%;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h3 { color: #8b0000; margin-bottom: 15px; }
        .modal-resumo { margin: 15px 0; max-height: 300px; overflow-y: auto; }
        .resumo-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }
        .resumo-nota { color: #ffcc00; font-weight: bold; }
        .modal-botoes { display: flex; gap: 15px; margin-top: 20px; }
        .modal-botoes button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; }
        .btn-cancelar { background: #666; color: white; }
        .btn-confirmar { background: #2c5f2d; color: white; }
        
        .escalacao-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .time-card {
            border-radius: 16px;
            padding: 15px;
        }
        .time-card ul {
            list-style: none;
            padding: 0;
        }
        .time-card li {
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }
        
        @media (orientation: portrait) {
            body { padding: 12px; }
            .card { padding: 15px; }
            .card h2 { font-size: 1.1em; }
            .btn { padding: 12px; font-size: 14px; min-height: 44px; }
            .estrela { font-size: 32px; }
            .jogador-card { padding: 12px; }
            .jogador-nome { font-size: 1em; }
            .user-info { font-size: 0.8em; }
            .status-avaliacao { font-size: 0.75em; padding: 10px; }
            .logo { max-width: 40px; }
            h1 { font-size: 1.2em; }
            .escalacao-container { grid-template-columns: 1fr; gap: 15px; }
        }
        
        @media (min-width: 768px) and (orientation: landscape) {
            body { padding: 20px; }
            .logo-area { gap: 20px; padding: 15px 30px; }
            .logo { max-width: 60px; }
            h1 { font-size: 1.8em; }
            .card { padding: 25px; }
            .jogadores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
            .estrela { font-size: 35px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area" id="logoVoltar">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>⭐ Avaliar Jogadores</h1>
            </div>
        </div>

        <div id="loginScreen" class="card">
            <div class="login-area">
                <h2>🔐 Login do Mensalista</h2>
                <select id="selectMensalista" class="login-input"><option value="">Selecione seu nome</option></select>
                <input type="password" id="senha" class="login-input" placeholder="Sua senha">
                <div class="checkbox-container">
                    <input type="checkbox" id="lembrarMim">
                    <label for="lembrarMim">🔐 Lembrar de mim</label>
                </div>
                <button id="btnLogin" class="btn">Entrar</button>
            </div>
        </div>

        <div id="selecaoScreen" style="display: none;">
            <div class="user-info" id="userInfoSelecao"></div>
            <div class="card">
                <h2>📋 Selecione uma partida para avaliar</h2>
                <div id="listaPartidasContainer">
                    <div class="status-avaliacao">Carregando partidas...</div>
                </div>
                <button id="btnVoltarSelecao" class="btn" style="background:#1a1a1a; margin-top:20px;">← Voltar</button>
            </div>
        </div>

        <div id="avaliacoesScreen" style="display: none;">
            <div class="user-info" id="userInfo"></div>
            <div class="card">
                <h2>📝 Avaliar Jogadores da Partida</h2>
                <div id="infoPartidaSelecionada" style="background:#f0f0f0; padding:10px; border-radius:10px; margin-bottom:15px; font-size:0.9em; word-break:break-word;"></div>
                
                <div id="placarContainer"></div>
                
                <div id="escalacaoContainer"></div>
                
                <div id="statusContainer" class="status-avaliacao"></div>
                <div id="jogadoresContainer">Carregando...</div>
                <button id="btnSalvarTodas" class="btn btn-salvar" disabled>💾 SALVAR TODAS AS AVALIAÇÕES</button>
                <button id="btnVoltarAvaliacoes" class="btn" style="background:#1a1a1a; margin-top:10px;">← Voltar às Partidas</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let mensalistaAtual = null;
        let partidaSelecionada = null;
        let jogadoresPartida = [];
        let avaliacoesPendentes = {};

        const loginScreen = document.getElementById('loginScreen');
        const selecaoScreen = document.getElementById('selecaoScreen');
        const avaliacoesScreen = document.getElementById('avaliacoesScreen');

        function formatarData(dataString) {
            const [ano, mes, dia] = dataString.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function salvarSessao(id, nome) {
            localStorage.setItem('mensalista_id', id);
            localStorage.setItem('mensalista_nome', nome);
        }

        function limparSessao() {
            localStorage.removeItem('mensalista_id');
            localStorage.removeItem('mensalista_nome');
        }

        async function verificarSessao() {
            const savedId = localStorage.getItem('mensalista_id');
            const savedNome = localStorage.getItem('mensalista_nome');
            
            if (!savedId || !savedNome) return false;
            
            const { data } = await supabaseClient
                .from('mensalistas')
                .select('id, nome')
                .eq('id', savedId)
                .single();
            
            if (data && data.nome === savedNome) {
                mensalistaAtual = { id: data.id, nome: data.nome };
                loginScreen.style.display = 'none';
                selecaoScreen.style.display = 'block';
                document.getElementById('userInfoSelecao').innerHTML = `<span>👤 ${mensalistaAtual.nome}</span> <span>⭐ Escolha uma partida para avaliar</span>`;
                await carregarPartidasNaoAvaliadas();
                return true;
            }
            return false;
        }

        async function carregarMensalistas() {
            const { data } = await supabaseClient.from('mensalistas').select('id, nome').order('nome');
            const select = document.getElementById('selectMensalista');
            select.innerHTML = '<option value="">Selecione seu nome</option>';
            if (data) data.forEach(m => { const opt = document.createElement('option'); opt.value = m.id; opt.textContent = m.nome; select.appendChild(opt); });
        }

        async function fazerLogin() {
            const id = document.getElementById('selectMensalista').value;
            const senha = document.getElementById('senha').value;
            const lembrar = document.getElementById('lembrarMim').checked;
            
            if (!id || !senha) { alert('Preencha todos os campos'); return; }
            
            const { data } = await supabaseClient.from('mensalistas').select('*').eq('id', id).single();
            if (!data || senha !== data.senha_hash) { alert('Senha incorreta!'); return; }
            
            mensalistaAtual = { id: data.id, nome: data.nome };
            
            if (lembrar) salvarSessao(data.id, data.nome);
            
            loginScreen.style.display = 'none';
            selecaoScreen.style.display = 'block';
            document.getElementById('userInfoSelecao').innerHTML = `<span>👤 ${mensalistaAtual.nome}</span> <span>⭐ Escolha uma partida para avaliar</span>`;
            
            await carregarPartidasNaoAvaliadas();
        }

        function fazerLogout() {
            limparSessao();
            window.location.reload();
        }

        async function carregarPartidasNaoAvaliadas() {
            const container = document.getElementById('listaPartidasContainer');
            container.innerHTML = '<div class="status-avaliacao">Carregando...</div>';
            
            const { data: partidas } = await supabaseClient.from('partidas').select('id, data, horario, local_id, gols_time_a, gols_time_b, resultado_finalizado').order('data', { ascending: false });
            if (!partidas || partidas.length === 0) {
                container.innerHTML = '<div class="status-avaliacao">Nenhuma partida encontrada</div>';
                return;
            }
            
            const { data: locais } = await supabaseClient.from('locais').select('id, nome');
            const locaisMap = {};
            locais?.forEach(l => { locaisMap[l.id] = l.nome; });
            
            const { data: avaliadas } = await supabaseClient.from('avaliacoes_partida').select('partida_id').eq('avaliador_id', mensalistaAtual.id);
            const idsAvaliados = new Set(avaliadas?.map(a => a.partida_id) || []);
            const naoAvaliadas = partidas.filter(p => !idsAvaliados.has(p.id));
            
            if (naoAvaliadas.length === 0) {
                container.innerHTML = '<div class="status-avaliacao">✅ Você já avaliou todas as partidas! Obrigado!</div>';
                return;
            }
            
            container.innerHTML = naoAvaliadas.map(partida => {
                const localNome = locaisMap[partida.local_id] || 'Local não informado';
                const temPlacar = partida.resultado_finalizado;
                const placarTexto = temPlacar ? ` 🏆 ${partida.gols_time_a} x ${partida.gols_time_b}` : ' ⏳ Placar pendente';
                return `
                    <div class="jogador-card" style="cursor:pointer;" data-id="${partida.id}">
                        <div class="jogador-nome">📅 ${formatarData(partida.data)} ${partida.horario ? `⏰ ${partida.horario}` : ''}${placarTexto}</div>
                        <div style="word-break:break-word;">📍 ${localNome}</div>
                        <button class="btn" style="margin-top:12px;" data-id="${partida.id}">⭐ Avaliar esta partida</button>
                    </div>
                `;
            }).join('');
            
            document.querySelectorAll('[data-id]').forEach(el => {
                el.addEventListener('click', async (e) => {
                    const id = parseInt(el.dataset.id);
                    if (!isNaN(id)) await selecionarPartida(id);
                });
            });
        }

        async function selecionarPartida(partidaId) {
            partidaSelecionada = partidaId;
            const { data: partida } = await supabaseClient.from('partidas').select('*, locais(nome)').eq('id', partidaId).single();
            const { data: escala } = await supabaseClient.from('escala_partida').select('*').eq('partida_id', partidaId);
            jogadoresPartida = escala?.filter(j => j.jogador_nome !== mensalistaAtual.nome) || [];
            
            const { data: avaliacoesExistentes } = await supabaseClient.from('avaliacoes_partida').select('*').eq('partida_id', partidaId).eq('avaliador_id', mensalistaAtual.id);
            if (avaliacoesExistentes && avaliacoesExistentes.length > 0) {
                alert('Você já avaliou esta partida! Voltando à lista...');
                await carregarPartidasNaoAvaliadas();
                return;
            }
            
            avaliacoesPendentes = {};
            selecaoScreen.style.display = 'none';
            avaliacoesScreen.style.display = 'block';
            document.getElementById('userInfo').innerHTML = `<span>👤 ${mensalistaAtual.nome}</span> <span>⭐ Avalie os jogadores</span>`;
            
            const localNome = partida?.locais?.nome || 'Local não informado';
            document.getElementById('infoPartidaSelecionada').innerHTML = `📅 ${formatarData(partida.data)} | ⏰ ${partida.horario || 'Horário não informado'} | 📍 ${localNome}`;
            
            // Exibir placar
            const placarContainer = document.getElementById('placarContainer');
            if (partida.resultado_finalizado) {
                placarContainer.innerHTML = `<div style="background:#1a1a1a; color:white; padding:10px; border-radius:12px; text-align:center; font-size:1.3em; font-weight:bold; margin-bottom:15px;">🏆 PLACAR FINAL: ${partida.gols_time_a} x ${partida.gols_time
