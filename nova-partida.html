<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>CYSS Futebol - Nova Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 20px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .logo-area:active { transform: scale(0.98); }
        .logo { max-width: 45px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.4em; }
        .subtitulo { color: #ffcccc; font-size: 0.8em; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1.3em;
        }
        .grid-2colunas { display: flex; flex-direction: column; gap: 20px; }
        .tipo-jogador { display: flex; gap: 15px; margin: 15px 0; padding: 10px; background: #f5f5f5; border-radius: 16px; flex-wrap: wrap; }
        .tipo-opcao { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px 16px; border-radius: 40px; background: white; border: 1px solid #ddd; flex: 1; justify-content: center; }
        .tipo-opcao.selected { background: #8b0000; color: white; }
        input, select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        .btn {
            background: #8b0000;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
            font-size: 16px;
            min-height: 48px;
        }
        .btn-sortear { background: #ffcc00; color: #8b0000; font-size: 1.2em; margin-top: 20px; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .lista-jogadores { list-style: none; padding: 0; }
        .lista-jogadores li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 14px;
            border-left: 5px solid #8b0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge-mensalista { background: #ffcc00; color: #8b0000; font-size: 0.7em; padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .badge-convidado { background: #555; color: white; font-size: 0.7em; padding: 3px 10px; border-radius: 20px; display: inline-block; }
        .btn-deletar { background: #1a1a1a; color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; min-height: 40px; }
        .contador { text-align: center; margin: 15px 0; padding: 10px; background: #ffe5e5; border-radius: 12px; font-weight: 600; color: #8b0000; }
        .times { margin-top: 20px; }
        .time-vermelho { background: #fff5f5; border: 2px solid #8b0000; }
        .time-branco { background: #fafafa; border: 2px solid #ccc; }
        .lista-times li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            word-break: break-word;
        }
        .info-partida {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            word-break: break-word;
        }
        .aviso {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #ffe5e5;
            border-radius: 12px;
            color: #8b0000;
        }
        .campo { margin-bottom: 20px; }
        .campo label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; }
        .grid-2 { display: flex; flex-direction: column; gap: 15px; }
        .endereco-destacado {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85em;
            color: #2e7d32;
            margin-top: -10px;
            margin-bottom: 15px;
            word-break: break-word;
        }
        
        @media (orientation: portrait) {
            body { padding: 12px; }
            .card { padding: 15px; }
            .card h2 { font-size: 1.1em; }
            .btn { padding: 12px; font-size: 14px; min-height: 44px; }
            .btn-sortear { font-size: 1em; }
            .lista-jogadores li { padding: 12px; }
            .lista-times li { padding: 12px; font-size: 0.85em; }
            .tipo-opcao { padding: 8px 12px; font-size: 0.85em; }
            input, select { padding: 12px; font-size: 14px; }
            .contador { font-size: 0.85em; }
            h1 { font-size: 1.2em; }
            .logo { max-width: 40px; }
        }
        
        @media (min-width: 768px) and (orientation: landscape) {
            body { padding: 20px; }
            .logo-area { gap: 20px; padding: 15px 30px; }
            .logo { max-width: 60px; }
            h1 { font-size: 1.6em; }
            .card { padding: 25px; }
            .grid-2colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
            .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
            .tipo-opcao { padding: 8px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area" id="logoVoltar">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>📝 Nova Partida</h1>
            </div>
            <p class="subtitulo">Preencha os dados, adicione os jogadores e sorteie os times</p>
        </div>

        <div class="card">
            <h2>📋 Dados da Partida</h2>
            <div class="grid-2">
                <div class="campo">
                    <label>📅 Data da Partida</label>
                    <input type="date" id="dataPartida" required>
                </div>
                <div class="campo">
                    <label>⏰ Horário</label>
                    <input type="time" id="horarioPartida">
                </div>
            </div>
            
            <div class="campo">
                <label>📍 Local</label>
                <select id="localPartida" required>
                    <option value="">Carregando locais...</option>
                </select>
            </div>
            
            <div id="enderecoDisplay" class="endereco-destacado" style="display: none;"></div>
            
            <div class="campo">
                <label>📝 Observações</label>
                <input type="text" id="observacoes" placeholder="Informações adicionais">
            </div>
        </div>

        <div class="grid-2colunas">
            <div class="card">
                <h2>➕ Adicionar Jogador</h2>
                
                <div class="tipo-jogador">
                    <label class="tipo-opcao" id="tipoMensalista"><input type="radio" name="tipo" value="mensalista" checked> <span>📌 Mensalista</span></label>
                    <label class="tipo-opcao" id="tipoConvidado"><input type="radio" name="tipo" value="convidado"> <span>🎟️ Convidado</span></label>
                </div>

                <div id="mensalistaContainer"><select id="selectMensalista"><option value="">-- Selecione --</option></select></div>
                <div id="convidadoContainer" style="display: none;"><input type="text" id="nomeConvidado" placeholder="Nome do convidado"></div>

                <button id="btnAdicionar" class="btn">➕ Adicionar à Escala</button>
                <div class="contador">Jogadores: <span id="totalJogadores">0</span> / 12</div>
            </div>

            <div class="card">
                <h2>📋 Escala</h2>
                <div id="listaJogadores"><p class="vazio">Nenhum jogador adicionado</p></div>
            </div>
        </div>

        <div class="card">
            <button id="btnSortear" class="btn btn-sortear">🎲 SORTEAR TIMES E FINALIZAR PARTIDA</button>
            <div id="avisoPartida" class="aviso" style="display: none;">⚠️ Esta partida já foi finalizada! Times já estão salvos.</div>
        </div>

        <div id="timesContainer" style="display: none;">
            <div class="grid-2colunas times">
                <div class="card time-vermelho"><h2>🔴 TIME VERMELHO</h2><ul id="timeALista" class="lista-times"></ul></div>
                <div class="card time-branco"><h2>⚪ TIME BRANCO</h2><ul id="timeBLista" class="lista-times"></ul></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MENSALISTAS = ["Luiz","Gabriel","Marcelo","Lucas Guil","Carlos","Cristoffer","Matheus","Lucas Coelho","Gustavo"];
        let partidaId = null;
        let jogadoresEscala = [];
        let timeA = [], timeB = [];
        let partidaFinalizada = false;
        let locaisLista = [];

        // Cache de notas dos jogadores
        let notasJogadores = {};

        // Buscar nota do jogador (nota inicial + média histórica)
        async function carregarNotasJogadores() {
            const { data: mensalistas } = await supabaseClient
                .from('mensalistas')
                .select('nome, nota_inicial');
            
            if (mensalistas) {
                mensalistas.forEach(m => {
                    notasJogadores[m.nome] = m.nota_inicial || 3;
                });
            }
            
            const { data: avaliacoes } = await supabaseClient
                .from('avaliacoes_partida')
                .select('avaliado_nome, nota');
            
            if (avaliacoes && avaliacoes.length > 0) {
                const somaNotas = {};
                const totalAvaliacoes = {};
                
                avaliacoes.forEach(a => {
                    if (!somaNotas[a.avaliado_nome]) {
                        somaNotas[a.avaliado_nome] = 0;
                        totalAvaliacoes[a.avaliado_nome] = 0;
                    }
                    somaNotas[a.avaliado_nome] += a.nota;
                    totalAvaliacoes[a.avaliado_nome]++;
                });
                
                for (const nome in somaNotas) {
                    const media = somaNotas[nome] / totalAvaliacoes[nome];
                    notasJogadores[nome] = Math.round(media * 10) / 10;
                }
            }
            
            jogadoresEscala.forEach(j => {
                if (!notasJogadores[j.nome]) {
                    notasJogadores[j.nome] = 3;
                }
            });
        }

        // Sorteio baseado apenas em notas (força)
        function sortearPorNotas(jogadores) {
            const goleiros = jogadores.filter(j => j.posicao === 'Goleiro');
            const outros = jogadores.filter(j => j.posicao !== 'Goleiro');
            
            let timeA = [];
            let timeB = [];
            let somaA = 0;
            let somaB = 0;
            
            if (goleiros.length === 1) {
                timeA.push(goleiros[0]);
                somaA += notasJogadores[goleiros[0].nome] || 3;
            } else if (goleiros.length >= 2) {
                goleiros.forEach((goleiro, index) => {
                    const nota = notasJogadores[goleiro.nome] || 3;
                    if (index % 2 === 0) {
                        timeA.push(goleiro);
                        somaA += nota;
                    } else {
                        timeB.push(goleiro);
                        somaB += nota;
                    }
                });
            }
            
            const outrosOrdenados = [...outros].sort((a, b) => {
                const notaA = notasJogadores[a.nome] || 3;
                const notaB = notasJogadores[b.nome] || 3;
                return notaB - notaA;
            });
            
            outrosOrdenados.forEach(jogador => {
                const nota = notasJogadores[jogador.nome] || 3;
                if (somaA <= somaB) {
                    timeA.push(jogador);
                    somaA += nota;
                } else {
                    timeB.push(jogador);
                    somaB += nota;
                }
            });
            
            while (Math.abs(timeA.length - timeB.length) > 1) {
                if (timeA.length > timeB.length) {
                    const movido = timeA.pop();
                    timeB.unshift(movido);
                    const notaMovido = notasJogadores[movido.nome] || 3;
                    somaA -= notaMovido;
                    somaB += notaMovido;
                } else if (timeB.length > timeA.length) {
                    const movido = timeB.pop();
                    timeA.unshift(movido);
                    const notaMovido = notasJogadores[movido.nome] || 3;
                    somaB -= notaMovido;
                    somaA += notaMovido;
                }
            }
            
            return { timeA, timeB, somaA, somaB };
        }

        function embaralharArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        async function carregarLocais() {
            console.log('Carregando locais...');
            const { data, error } = await supabaseClient.from('locais').select('id, nome, endereco').order('nome');
            if (error) {
                console.error('Erro ao carregar locais:', error);
                const select = document.getElementById('localPartida');
                if (select) select.innerHTML = '<option value="">Erro ao carregar locais</option>';
                return;
            }
            locaisLista = data || [];
            console.log('Locais carregados:', locaisLista.length);
            const select = document.getElementById('localPartida');
            if (select) {
                select.innerHTML = '<option value="">Selecione um local</option>';
                locaisLista.forEach(local => {
                    const option = document.createElement('option');
                    option.value = local.id;
                    option.textContent = local.nome;
                    option.dataset.endereco = local.endereco || '';
                    select.appendChild(option);
                });
            }
        }

        document.getElementById('localPartida').addEventListener('change', (e) => {
            const select = e.target;
            const selectedOption = select.options[select.selectedIndex];
            const endereco = selectedOption.dataset?.endereco || '';
            const enderecoDisplay = document.getElementById('enderecoDisplay');
            if (selectedOption.value && endereco) {
                enderecoDisplay.style.display = 'block';
                enderecoDisplay.innerHTML = `🏟️ <strong>Endereço:</strong> ${endereco}`;
            } else {
                enderecoDisplay.style.display = 'none';
                enderecoDisplay.innerHTML = '';
            }
        });

        function atualizarSelectMensalistas() {
            console.log('Atualizando select de mensalistas...');
            const nomesNaEscala = new Set(jogadoresEscala.map(j => j.nome));
            const disponiveis = MENSALISTAS.filter(m => !nomesNaEscala.has(m));
            const select = document.getElementById('selectMensalista');
            if (select) {
                select.innerHTML = '<option value="">-- Selecione --</option>';
                disponiveis.forEach(m => { 
                    const opt = document.createElement('option'); 
                    opt.value = m; 
                    opt.textContent = m; 
                    select.appendChild(opt); 
                });
                console.log('Mensalistas disponíveis:', disponiveis.length);
            }
        }

        function limparFormulario() {
            document.getElementById('selectMensalista').value = '';
            document.getElementById('nomeConvidado').value = '';
        }

        function alternarTipo() {
            const isMensalista = document.querySelector('input[name="tipo"]:checked').value === 'mensalista';
            const mensalistaContainer = document.getElementById('mensalistaContainer');
            const convidadoContainer = document.getElementById('convidadoContainer');
            if (mensalistaContainer) mensalistaContainer.style.display = isMensalista ? 'block' : 'none';
            if (convidadoContainer) convidadoContainer.style.display = isMensalista ? 'none' : 'block';
        }

        document.querySelectorAll('input[name="tipo"]').forEach(r => r.addEventListener('change', alternarTipo));

        document.getElementById('btnAdicionar').addEventListener('click', () => {
            if (partidaFinalizada) { alert('Esta partida já foi finalizada!'); return; }
            if (jogadoresEscala.length >= 12) { alert('Limite de 12 jogadores!'); return; }
            const isMensalista = document.querySelector('input[name="tipo"]:checked').value === 'mensalista';
            let nome = '';
            if (isMensalista) {
                nome = document.getElementById('selectMensalista').value;
                if (!nome) { alert('Selecione um mensalista!'); return; }
            } else {
                nome = document.getElementById('nomeConvidado').value.trim();
                if (!nome) { alert('Digite o nome do convidado!'); return; }
            }
            if (jogadoresEscala.some(j => j.nome === nome)) { alert('Jogador já está na escala!'); return; }
            jogadoresEscala.push({ id: Date.now(), nome, posicao: 'Fixo', tipo: isMensalista ? 'mensalista' : 'convidado' });
            atualizarLista();
            limparFormulario();
            alternarTipo();
        });

        function atualizarLista() {
            document.getElementById('totalJogadores').textContent = jogadoresEscala.length;
            const container = document.getElementById('listaJogadores');
            if (jogadoresEscala.length === 0) { 
                container.innerHTML = '<p class="vazio">Nenhum jogador adicionado</p>'; 
                return; 
            }
            container.innerHTML = '<ul class="lista-jogadores">' + jogadoresEscala.map(j => `
                <li><div><strong>${j.nome}</strong> ${j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>'}</div><button class="btn-deletar" onclick="removerJogador(${j.id})">❌</button></li>
            `).join('') + '</ul>';
            atualizarSelectMensalistas();
        }

        window.removerJogador = (id) => { 
            jogadoresEscala = jogadoresEscala.filter(j => j.id !== id); 
            atualizarLista(); 
            timeA = []; 
            timeB = []; 
            document.getElementById('timesContainer').style.display = 'none'; 
        };

        document.getElementById('btnSortear').addEventListener('click', async () => {
            if (partidaFinalizada) { alert('⚠️ Esta partida já foi finalizada!'); return; }
            if (jogadoresEscala.length < 4) { alert('Mínimo 4 jogadores!'); return; }
            
            const data = document.getElementById('dataPartida').value;
            if (!data) { alert('Selecione a data da partida!'); return; }
            
            const localId = document.getElementById('localPartida').value;
            if (!localId) { alert('Selecione o local da partida!'); return; }
            
            const localSelecionado = locaisLista.find(l => l.id == localId);
            const endereco = localSelecionado?.endereco || '';

            await carregarNotasJogadores();
            
            const { timeA: timesA, timeB: timesB, somaA, somaB } = sortearPorNotas(jogadoresEscala);
            timeA = timesA;
            timeB = timesB;
            
            const partida = {
                data: data,
                horario: document.getElementById('horarioPartida').value,
                local_id: parseInt(localId),
                endereco: endereco,
                observacoes: document.getElementById('observacoes').value
            };

            const { data: novaPartida, error } = await supabaseClient.from('partidas').insert(partida).select().single();
            if (error) { 
                alert('Erro ao salvar partida: ' + error.message); 
                return; 
            }
            
            partidaId = novaPartida.id;

            const escala = [...timeA.map(j => ({ ...j, time: 'A' })), ...timeB.map(j => ({ ...j, time: 'B' }))];
            for (const j of escala) {
                await supabaseClient.from('escala_partida').insert({
                    partida_id: partidaId, 
                    jogador_nome: j.nome, 
                    posicao: j.posicao,
                    habilidades: [], 
                    tipo: j.tipo, 
                    time: j.time
                });
            }

            partidaFinalizada = true;
            document.getElementById('btnSortear').disabled = true;
            document.getElementById('btnSortear').style.opacity = '0.5';
            document.getElementById('avisoPartida').style.display = 'block';
            
            const notaFormatada = (nota) => '⭐'.repeat(Math.round(nota)) + '☆'.repeat(5 - Math.round(nota));
            alert(`✅ Partida finalizada!\n\nTime A: ${somaA.toFixed(1)} estrelas\nTime B: ${somaB.toFixed(1)} estrelas\nDiferença: ${Math.abs(somaA - somaB).toFixed(1)} estrelas`);

            document.getElementById('timesContainer').style.display = 'block';
            document.getElementById('timeALista').innerHTML = timeA.map(j => `<li><strong>${j.nome}</strong> <div>${j.tipo === 'mensalista' ? '📌 Mensalista' : '🎟️ Convidado'}</div><div style="font-size:0.7em; color:#8b0000;">${notaFormatada(notasJogadores[j.nome] || 3)}</div></li>`).join('');
            document.getElementById('timeBLista').innerHTML = timeB.map(j => `<li><strong>${j.nome}</strong> <div>${j.tipo === 'mensalista' ? '📌 Mensalista' : '🎟️ Convidado'}</div><div style="font-size:0.7em; color:#8b0000;">${notaFormatada(notasJogadores[j.nome] || 3)}</div></li>`).join('');

            localStorage.setItem('partidaRanking', partidaId);
        });

        document.getElementById('logoVoltar').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // INICIALIZAÇÃO
        async function init() {
            console.log('Inicializando nova-partida.html...');
            await carregarLocais();
            atualizarSelectMensalistas();
            alternarTipo();
        }
        
        init();
    </script>
</body>
</html>
