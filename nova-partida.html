<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYSS Futebol - Nova Partida</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0000 0%, #8b0000 50%, #1a0000 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .logo-area {
            display: inline-flex;
            align-items: center;
            gap: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 30px;
            border-radius: 60px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        .logo { max-width: 60px; height: auto; border-radius: 12px; }
        h1 { color: white; font-size: 1.8em; }
        .subtitulo { color: #ffcccc; }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .card h2 {
            color: #8b0000;
            border-bottom: 3px solid #8b0000;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .grid-2colunas { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
        }
        .tipo-jogador { display: flex; gap: 20px; margin: 15px 0; padding: 10px; background: #f5f5f5; border-radius: 16px; }
        .tipo-opcao { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 20px; border-radius: 40px; background: white; border: 1px solid #ddd; }
        .tipo-opcao.selected { background: #8b0000; color: white; }
        .habilidades-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .checkbox-habilidade {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-size: 13px;
            background: white;
            padding: 6px 14px;
            border-radius: 25px;
            border: 1px solid #ddd;
        }
        .btn {
            background: #8b0000;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
        }
        .btn-sortear { background: #ffcc00; color: #8b0000; font-size: 1.2em; }
        .lista-jogadores { list-style: none; padding: 0; }
        .lista-jogadores li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 14px;
            border-left: 5px solid #8b0000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .badge-mensalista { background: #ffcc00; color: #8b0000; font-size: 0.7em; padding: 2px 8px; border-radius: 20px; margin-left: 10px; }
        .badge-convidado { background: #555; color: white; font-size: 0.7em; padding: 2px 8px; border-radius: 20px; margin-left: 10px; }
        .btn-deletar { background: #1a1a1a; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; }
        .btn-deletar:hover { background: #8b0000; }
        .contador { text-align: center; margin: 15px 0; padding: 10px; background: #ffe5e5; border-radius: 12px; font-weight: 600; color: #8b0000; }
        .times { margin-top: 20px; }
        .time-vermelho { background: #fff5f5; border: 2px solid #8b0000; }
        .time-branco { background: #fafafa; border: 2px solid #ccc; }
        .lista-times li { background: white; margin: 10px 0; padding: 15px; border-radius: 14px; }
        @media (max-width: 768px) { .grid-2colunas { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="image.png" alt="CYSS Futebol" class="logo" onerror="this.style.display='none'">
                <h1>📝 Nova Partida</h1>
            </div>
            <p class="subtitulo">CYSS FUTEBOL | Defina a data, adicione jogadores e sorteie os times</p>
        </div>

        <div id="mensagem" class="mensagem" style="display: none;"></div>

        <div class="card">
            <h2>📅 Data da Partida</h2>
            <input type="date" id="dataPartida" required>
        </div>

        <div class="grid-2colunas">
            <div class="card">
                <h2>➕ Adicionar Jogador</h2>
                
                <div class="tipo-jogador" id="tipoJogador">
                    <label class="tipo-opcao" id="tipoMensalista"><input type="radio" name="tipo" value="mensalista" checked> <span>📌 Mensalista</span></label>
                    <label class="tipo-opcao" id="tipoConvidado"><input type="radio" name="tipo" value="convidado"> <span>🎟️ Convidado</span></label>
                </div>

                <div id="mensalistaContainer"><select id="selectMensalista"><option value="">-- Selecione --</option></select></div>
                <div id="convidadoContainer" style="display: none;"><input type="text" id="nomeConvidado" placeholder="Nome do convidado"></div>

                <select id="posicao">
                    <option value="">Selecione a posição</option>
                    <option value="Goleiro">Goleiro</option><option value="Fixo">Fixo</option>
                    <option value="Ala Esquerda">Ala Esquerda</option><option value="Ala Direita">Ala Direita</option>
                    <option value="Pivô">Pivô</option>
                </select>

                <div class="habilidades-grid" id="habilidadesContainer"></div>

                <button id="btnAdicionar" class="btn">➕ Adicionar à Escala</button>
                <div class="contador">Jogadores: <span id="totalJogadores">0</span> / 12</div>
            </div>

            <div class="card">
                <h2>📋 Escala da Partida</h2>
                <div id="listaJogadores"><p class="vazio">Nenhum jogador adicionado</p></div>
            </div>
        </div>

        <div class="card">
            <button id="btnSortear" class="btn btn-sortear">🎲 SORTEAR TIMES E FINALIZAR PARTIDA</button>
        </div>

        <div id="timesContainer" style="display: none;">
            <div class="grid-2colunas times">
                <div class="card time-vermelho"><h2>🔴 TIME VERMELHO</h2><ul id="timeALista" class="lista-times"></ul></div>
                <div class="card time-branco"><h2>⚪ TIME BRANCO</h2><ul id="timeBLista" class="lista-times"></ul></div>
            </div>
        </div>

        <button id="btnVoltar" class="btn" style="background:#1a1a1a;">← Voltar às Partidas</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yizixptrdbssgrgdzdqf.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlpeml4cHRyZGJzc2dyZ2R6ZHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjEwMzAsImV4cCI6MjA5NjU5NzAzMH0.ugNYyquAwI3qthSmLYedHWNftdd2__TF4p6W3Dtm-O0';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MENSALISTAS = ["Luiz","Gabriel","Marcelo","Lucas Guil","Carlos","Cristoffer","Matheus","Lucas Coelho","Gustavo"];
        const HABILIDADES = ['Veloz','Forte','Bom passe','Marcação forte','Finalização','Visão de jogo','Drible','Cabeceio','Liderança','Resistência'];

        let jogadoresEscala = [];
        let timeA = [], timeB = [];

        function exibirMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.textContent = texto;
            msg.style.backgroundColor = tipo === 'erro' ? '#8b0000' : '#2c5f2d';
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function atualizarSelectMensalistas() {
            const nomesNaEscala = new Set(jogadoresEscala.map(j => j.nome));
            const disponiveis = MENSALISTAS.filter(m => !nomesNaEscala.has(m));
            const select = document.getElementById('selectMensalista');
            select.innerHTML = '<option value="">-- Selecione --</option>';
            disponiveis.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.textContent = m; select.appendChild(opt); });
        }

        function criarCheckboxes() {
            const container = document.getElementById('habilidadesContainer');
            container.innerHTML = '';
            HABILIDADES.forEach(h => {
                const label = document.createElement('label');
                label.className = 'checkbox-habilidade';
                label.innerHTML = `<input type="checkbox" name="habilidade" value="${h}"><span>${h}</span>`;
                container.appendChild(label);
            });
        }

        function getHabilidades() {
            const checkboxes = document.querySelectorAll('input[name="habilidade"]:checked');
            if (checkboxes.length < 2) { exibirMensagem('Selecione 2 ou 3 habilidades!', 'erro'); return null; }
            if (checkboxes.length > 3) { exibirMensagem('Máximo 3 habilidades!', 'erro'); return null; }
            return Array.from(checkboxes).map(cb => cb.value);
        }

        function limparFormulario() {
            document.getElementById('selectMensalista').value = '';
            document.getElementById('nomeConvidado').value = '';
            document.getElementById('posicao').value = '';
            document.querySelectorAll('input[name="habilidade"]:checked').forEach(cb => cb.checked = false);
        }

        function alternarTipo() {
            const isMensalista = document.querySelector('input[name="tipo"]:checked').value === 'mensalista';
            document.getElementById('mensalistaContainer').style.display = isMensalista ? 'block' : 'none';
            document.getElementById('convidadoContainer').style.display = isMensalista ? 'none' : 'block';
        }

        document.querySelectorAll('input[name="tipo"]').forEach(r => r.addEventListener('change', alternarTipo));

        document.getElementById('btnAdicionar').addEventListener('click', () => {
            if (jogadoresEscala.length >= 12) { exibirMensagem('Limite de 12 jogadores!', 'erro'); return; }
            const habilidades = getHabilidades();
            if (!habilidades) return;
            const posicao = document.getElementById('posicao').value;
            if (!posicao) { exibirMensagem('Selecione a posição!', 'erro'); return; }
            const isMensalista = document.querySelector('input[name="tipo"]:checked').value === 'mensalista';
            let nome = '';
            if (isMensalista) {
                nome = document.getElementById('selectMensalista').value;
                if (!nome) { exibirMensagem('Selecione um mensalista!', 'erro'); return; }
            } else {
                nome = document.getElementById('nomeConvidado').value.trim();
                if (!nome) { exibirMensagem('Digite o nome do convidado!', 'erro'); return; }
            }
            if (jogadoresEscala.some(j => j.nome === nome)) { exibirMensagem('Jogador já está na escala!', 'erro'); return; }
            jogadoresEscala.push({ id: Date.now(), nome, posicao, habilidades, tipo: isMensalista ? 'mensalista' : 'convidado' });
            atualizarLista();
            limparFormulario();
            alternarTipo();
        });

        function atualizarLista() {
            document.getElementById('totalJogadores').textContent = jogadoresEscala.length;
            const container = document.getElementById('listaJogadores');
            if (jogadoresEscala.length === 0) { container.innerHTML = '<p class="vazio">Nenhum jogador adicionado</p>'; return; }
            container.innerHTML = '<ul class="lista-jogadores">' + jogadoresEscala.map(j => `
                <li><div><strong>${j.nome}</strong> ${j.tipo === 'mensalista' ? '<span class="badge-mensalista">Mensalista</span>' : '<span class="badge-convidado">Convidado</span>'}<br><small>📍 ${j.posicao} | 💪 ${j.habilidades.join(', ')}</small></div><button class="btn-deletar" onclick="removerJogador(${j.id})">❌</button></li>
            `).join('') + '</ul>';
            atualizarSelectMensalistas();
        }

        window.removerJogador = (id) => { jogadoresEscala = jogadoresEscala.filter(j => j.id !== id); atualizarLista(); timeA = []; timeB = []; document.getElementById('timesContainer').style.display = 'none'; };

        function distribuirAlternado(lista, a, b) { lista.forEach((j, i) => i % 2 === 0 ? a.push(j) : b.push(j)); }
        function embaralhar(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

        document.getElementById('btnSortear').addEventListener('click', async () => {
            if (jogadoresEscala.length < 4) { exibirMensagem('Mínimo 4 jogadores!', 'erro'); return; }
            const data = document.getElementById('dataPartida').value;
            if (!data) { exibirMensagem('Selecione a data da partida!', 'erro'); return; }

            const goleiros = jogadoresEscala.filter(j => j.posicao === 'Goleiro');
            const outros = jogadoresEscala.filter(j => j.posicao !== 'Goleiro');
            timeA = []; timeB = [];
            if (goleiros.length === 1) timeA.push(goleiros[0]);
            else goleiros.forEach((g, i) => i % 2 === 0 ? timeA.push(g) : timeB.push(g));
            distribuirAlternado(outros, timeA, timeB);
            while (Math.abs(timeA.length - timeB.length) > 1) {
                if (timeA.length > timeB.length) timeB.unshift(timeA.pop());
                else timeA.unshift(timeB.pop());
            }
            timeA = embaralhar(timeA); timeB = embaralhar(timeB);

            // Salvar no Supabase
            const { data: partida, error: errPartida } = await supabaseClient.from('partidas').insert({ data }).select().single();
            if (errPartida) { exibirMensagem('Erro ao salvar partida!', 'erro'); return; }

            const escala = [...timeA.map(j => ({ ...j, time: 'A' })), ...timeB.map(j => ({ ...j, time: 'B' }))];
            for (const j of escala) {
                await supabaseClient.from('escala_partida').insert({
                    partida_id: partida.id, jogador_nome: j.nome, posicao: j.posicao,
                    habilidades: j.habilidades, tipo: j.tipo, time: j.time
                });
            }

            exibirMensagem('Partida salva com sucesso!', 'sucesso');
            document.getElementById('timesContainer').style.display = 'block';
            document.getElementById('timeALista').innerHTML = timeA.map(j => `<li><strong>${j.nome}</strong><br><span class="posicao">${j.posicao}</span><div>💪 ${j.habilidades.join(', ')}</div></li>`).join('');
            document.getElementById('timeBLista').innerHTML = timeB.map(j => `<li><strong>${j.nome}</strong><br><span class="posicao">${j.posicao}</span><div>💪 ${j.habilidades.join(', ')}</div></li>`).join('');

            setTimeout(() => { window.location.href = 'partidas.html'; }, 2000);
        });

        document.getElementById('btnVoltar').addEventListener('click', () => { window.location.href = 'partidas.html'; });

        criarCheckboxes();
        alternarTipo();
        atualizarSelectMensalistas();
    </script>
</body>
</html>
